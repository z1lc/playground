      margin-bottom: 18px;

      display: flex;

      align-items: center;

      font-size: 12.5px;
      color: #64748b;
      margin-left: auto;
      font-style: italic;
    }
    .checkbox-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      color: #cbd5e1;
      background: rgba(255, 255, 255, 0.02);
      transition: border-color 0.15s, background 0.15s, color 0.15s;

    .checkbox-pill input { appearance: none; -webkit-appearance: none; margin: 0; width: 0; height: 0; position: absolute; }
    .checkbox-pill .swatch {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.20);
      flex-shrink: 0;
    }
    .checkbox-pill.selected { color: #f1f5f9; background: rgba(255, 255, 255, 0.07); border-color: rgba(255, 255, 255, 0.30); }

    .legend-row {
      display: flex;
      gap: 14px 22px;
      flex-wrap: wrap;
      padding: 0 6px 12px;
      font-size: 12.5px;
      color: #cbd5e1;
    }

      vertical-align: middle;
      margin-right: 8px;
      border-radius: 2px;
    }
    .legend-row .legend-axis {
      color: #64748b;
      font-size: 11.5px;
      margin-left: 6px;
    }

    .recharts-default-tooltip {
      background: #1e293b !important;
      border: 1px solid #334155 !important;
      border-radius: 8px !important;
    }
    .tt {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12.5px;
      min-width: 200px;
    }
    .tt-date {
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .tt-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;

    .methodology h3 { font-size: 0.9rem; font-weight: 600; color: #e2e8f0; margin: 14px 0 4px; text-transform: uppercase; letter-spacing: 0.04em; color: #94a3b8; }

    .methodology a { color: #fbbf24; text-decoration: none; }

      }
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
    }

    /** Build the date-indexed dataframe used by Recharts.
     *
     *  Each line is keyed by `${metric.id}_${etf}`. Values are written ONLY
     *  on the dates the source actually reports — daily for prices,
     *  monthly/quarterly for holdings. Recharts then draws each line through
     *  its own non-null points (with `connectNulls`), so weight lines remain
     *  smoothly interpolated between observation dates instead of getting
     *  stepped to match the daily price grid.
     */
    function buildChartData(metrics, etfs) {
      const dateSet = new Set();
      for (const m of metrics) {
        for (const etf of etfs) {
          for (const [d] of (m.series[etf] || [])) dateSet.add(d);
        }
      }
      const dates = Array.from(dateSet).sort();
      const dayMs = 86400000;
      const rows = dates.map((d) => ({
        date: d,
        dateNum: Math.floor(new Date(d + 'T00:00:00Z').getTime() / dayMs),
      }));
      const dateToIdx = new Map(dates.map((d, i) => [d, i]));
      for (const m of metrics) {
        for (const etf of etfs) {
          for (const [d, v] of (m.series[etf] || [])) {
            const idx = dateToIdx.get(d);
            if (idx != null) rows[idx][`${m.id}_${etf}`] = v;
          }
        }
      }
      return rows;
    }

    /** For sparse series (weights), look up the most recent observation
     *  with date <= the hovered date. Returns {date, value} or null. */
    function lookupLatest(seriesPairs, hoverDate) {
      if (!seriesPairs || !seriesPairs.length) return null;
      let best = null;
      for (const [d, v] of seriesPairs) {
        if (d <= hoverDate) best = { date: d, value: v };
        else break;  // series is sorted ascending
      }
      return best;
    }

    function CustomTooltip({ active, payload, label, metrics, etfs }) {
      if (!active || label == null) return null;
      // `label` here is the dateNum (days-since-epoch). Convert back to ISO
      // for series lookups, since each metric's series is keyed by ISO date.
      const hoverIso = new Date(label * 86400000).toISOString().slice(0, 10);
      return html`
        <div class="tt">
          <div class="tt-date">${formatDate(label)}</div>
          ${metrics.map((m, mi) => {
            const fmt = FORMATTERS[m.format] || ((v) => v?.toString() ?? '—');
            // Order rows highest-value first so the eye lands on the leader
            // at this point in time. Drawdown values are negative, so the
            // "highest" is the least-impacted ETF — still useful framing.
            // Missing values (no data at this date for that ETF) sort last.
            const rows = etfs
              .map((etf) => ({ etf, latest: lookupLatest(m.series[etf], hoverIso) }))
              .sort((a, b) => {
                const av = a.latest?.value;
                const bv = b.latest?.value;
                if (av == null && bv == null) return 0;
                if (av == null) return 1;
                if (bv == null) return -1;
                return bv - av;
              });
            return html`
              <div style=${{marginBottom: mi < metrics.length - 1 ? 6 : 0}}>
                ${rows.map(({ etf, latest }) => html`
                  <div class="tt-row" key=${`${m.id}_${etf}`}>
                    <span class="swatch" style=${swatchStyleFor(m.id, etf)}></span>
                    <span class="label">${labelFor(etf)} · ${m.label}</span>
                    <span class="value">${fmt(latest?.value)}</span>
                  </div>
                `)}
              </div>
            `;
          })}
        </div>
      `;
    }

    function App() {
      const metricsById = useMemo(() => {
        const map = new Map();
        for (const m of (DATA.metrics || [])) map.set(m.id, m);
        return map;
      }, []);

      // Selection lives as a list of axis-group entries. Each entry is
      // `{ group, metrics: [metricId, ...] }`. Max 2 entries (one per axis).
      // Within an entry there's no upper bound — all weight metrics share an
      // axis, so any number of weight metrics is fine.
      const initialSelection = useMemo(() => {
        const etfList = DATA.etfs || ['EUSA', 'VTI', 'VT'];
        const hasData = (id) => {
          const m = metricsById.get(id);
          return m && etfList.some((e) => (m.series[e] || []).length > 0);
        };
        const out = [];
        for (const id of PREFERRED_DEFAULTS) {
          if (!hasData(id)) continue;
          const group = METRIC_GROUPS[id];
          const existing = out.find((e) => e.group === group);
          if (existing) {
            // Keep selection compact: only include the first metric per group
            // by default; user can add more.
            continue;
          }
          if (out.length >= 2) break;
          out.push({ group, metrics: [id] });
        }
        if (out.length === 0 && DATA.metrics?.length) {
          const first = DATA.metrics[0];
          out.push({ group: METRIC_GROUPS[first.id] || 'index', metrics: [first.id] });
        }
        return out;
      }, [metricsById]);
      const [selection, setSelection] = useState(() => {
        const stored = loadStoredSelection(metricsById);
        return stored || initialSelection;
      });

      // Persist on every change. localStorage may throw in private mode etc.
      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(selection));
        } catch (e) { /* swallow */ }
      }, [selection]);

      const toggle = useCallback((id) => {
        setSelection((prev) => {
          const group = METRIC_GROUPS[id] || 'other';
          const groupIdx = prev.findIndex((s) => s.group === group);
          if (groupIdx >= 0) {
            const entry = prev[groupIdx];
            if (entry.metrics.includes(id)) {
              // Removing — keep at least one metric overall.
              const remaining = entry.metrics.filter((m) => m !== id);
              if (remaining.length === 0) {
                if (prev.length === 1) return prev;
                return prev.filter((_, i) => i !== groupIdx);
              }
              return prev.map((s, i) => i === groupIdx ? { ...s, metrics: remaining } : s);
            }
            // Adding to an existing group — no FIFO needed, axis is shared.
            return prev.map((s, i) => i === groupIdx ? { ...s, metrics: [...s.metrics, id] } : s);
          }
          // New group: if we already have 2, drop the oldest entry.
          const next = prev.length >= 2 ? prev.slice(1) : prev.slice();
          next.push({ group, metrics: [id] });
          return next;
        });
      }, []);

      // Flatten selection into the list of metric objects, preserving order.
      const selectedMetrics = selection.flatMap((entry) =>
        entry.metrics.map((id) => metricsById.get(id)).filter(Boolean)
      );

      const etfs = DATA.etfs || ['EUSA', 'VTI', 'VT'];
      const chartData = useMemo(() => buildChartData(selectedMetrics, etfs), [selectedMetrics, etfs]);

      // Track viewport width so we can thin year ticks on narrow screens.
      const [vw, setVw] = useState(() => (typeof window !== 'undefined' ? window.innerWidth : 1024));
      useEffect(() => {
        const onResize = () => setVw(window.innerWidth);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      const isNarrow = vw <= 640;
      const isVeryNarrow = vw <= 420;

      // Determine x-axis domain — restrict to dates where at least one
      // visible series has data, to avoid a giant blank left margin when
      // only holdings (2019+) are selected.
      const xDomain = useMemo(() => {
        if (!chartData.length) return ['auto', 'auto'];
        let firstActive = null;
        for (let i = 0; i < chartData.length; i++) {
          const row = chartData[i];
          const hasAny = Object.entries(row).some(([k, v]) => k !== 'date' && k !== 'dateNum' && v != null);
          if (hasAny) { firstActive = row.dateNum; break; }
        }
        return [firstActive || chartData[0].dateNum, chartData[chartData.length - 1].dateNum];
      }, [chartData]);

      // One y-axis per axis-group in the selection (left for group 0,
      // right for group 1). All metrics within a group share that axis.
      const yAxes = selection.map((entry, i) => {
        const slot = i === 0 ? 'A' : 'B';
        const groupSpec = GROUP_AXIS[entry.group] || { domain: ['auto', 'auto'], format: 'percent' };
        return {
          id: slot,
          orientation: i === 0 ? 'left' : 'right',
          format: groupSpec.format,
          domain: groupSpec.domain,
          group: entry.group,
        };
      });
      const slotForGroup = (group) => {
        const idx = selection.findIndex((s) => s.group === group);
        return idx === 0 ? 'A' : (idx === 1 ? 'B' : 'A');
      };

      // Each selected metric becomes 2 lines, one per ETF, on the same axis.
      // Encoding depends on metric type — see METRIC_COLORS comment.
      const lines = [];
      for (const m of selectedMetrics) {
        const slot = slotForGroup(METRIC_GROUPS[m.id]);
        for (const etf of etfs) {
          lines.push({
            key: `${m.id}_${etf}`,
            stroke: colorFor(m.id, etf),
            strokeDasharray: dashFor(m.id, etf),
            yAxisId: slot,
            etf,
            metricLabel: m.label,
          });
        }
      }

      // Tick formatter for x-axis: thin out years.
      const xTicks = useMemo(() => {
        if (!chartData.length) return [];
        // Pick one numeric tick per year (first row that lands in that year).
        const yearStarts = [];
        let lastYear = null;
        for (const row of chartData) {
          const y = row.date.slice(0, 4);
          if (y !== lastYear) {
            yearStarts.push(row.dateNum);
            lastYear = y;
          }
        }
        const yearStep = isVeryNarrow ? 3 : isNarrow ? 2 : 1;
        return yearStarts.filter((_, i) => i % yearStep === 0);
      }, [chartData, isNarrow, isVeryNarrow]);

      const fmtAxis = (axisIdx) => {
        const ax = yAxes[axisIdx];
        const f = AXIS_FORMATTERS[ax?.format];
        return f || ((v) => v?.toString() ?? '');
      };

      const aiBasketStr = (DATA.metadata?.aiBasketConstituents || []).join(', ');
      const mag7Str = (DATA.metadata?.mag7Constituents || []).join(', ');
      // "Extras" = broader basket minus Mag 7, so the methodology can read
      // "Mag 7 + (extras)" instead of repeating the Mag 7 names.
      const _mag7Set = new Set(DATA.metadata?.mag7Constituents || []);
      const aiBasketExtrasStr = (DATA.metadata?.aiBasketConstituents || [])
        .filter((t) => !_mag7Set.has(t))
        .join(', ');
      const generatedAt = DATA.generatedAt || '';

      return html`
        <div class="container">
          <h1><code>EUSA</code> vs <code>VTI</code> vs <code>VT</code></h1>
          <p class="subtitle">
            Three different bets on equities — <code>EUSA</code> (iShares MSCI USA Equal Weighted), <code>VTI</code> (Vanguard Total US Stock Market), and <code>VT</code> (Vanguard Total World Stock).
            US equal-weighted vs US cap-weighted vs World cap-weighted (~62% US, ~38% international). Pick metrics below to compare them over time — weight metrics share an axis, so any combination is fair game. <em>Data through ${generatedAt}. EUSA only launched in 2010; for a longer timeline see <a href="https://testfol.io/?s=dcyi30ZdVQd" target="_blank" rel="noopener">VTI vs RSP vs VT-equiv</a>.</em>
          </p>

          <div class="card">
            <div class="selector">
              ${(DATA.metrics || []).map((m) => {
                const isSelected = selection.some((s) => s.metrics.includes(m.id));
                const empty = !etfs.some((e) => (m.series[e] || []).length > 0);
                // Pill swatch when selected:
                //   - shared-color metric (weights): solid metric color.
                //   - distinct-color metric (drawdown / cum return): the
                //     three ETF shades split on a 135° diagonal — VTI dark
                //     top-left, VT mid in the middle, EUSA light bottom-right.
                let swatchStyle = {};
                if (isSelected) {
                  if (usesSharedColor(m.id)) {
                    swatchStyle = { background: colorFor(m.id, 'VTI') };
                  } else {
                    const vti = colorFor(m.id, 'VTI');
                    const vt = colorFor(m.id, 'VT');
                    const eusa = colorFor(m.id, 'EUSA');
                    swatchStyle = {
                      background: `linear-gradient(135deg, ${vti} 0%, ${vti} 33%, ${vt} 33%, ${vt} 67%, ${eusa} 67%, ${eusa} 100%)`,
                    };
                  }
                }
                const labelStyle = empty ? {opacity: 0.4, cursor: 'not-allowed'} : {};
                return html`
                  <label class=${`checkbox-pill ${isSelected ? 'selected' : ''}`} key=${m.id}
                    style=${labelStyle}>
                    <input type="checkbox" checked=${isSelected} disabled=${empty}
                      onChange=${() => !empty && toggle(m.id)} />
                    <span class="swatch" style=${swatchStyle}></span>
                    <span>${m.label}${empty ? ' (no data)' : ''}</span>
                  </label>
                `;
              })}
              <span class="hint">Weight metrics share an axis — pick as many as you like. Drawdown and total-return each get their own axis.</span>
            </div>
          </div>

          <div class="card">
            <div class="legend-row">
              ${selectedMetrics.flatMap((m) => {
                const slot = slotForGroup(METRIC_GROUPS[m.id]);
                const axisLabel = selection.length > 1
                  ? (slot === 'A' ? 'left axis' : 'right axis')
                  : 'left axis';
                return etfs.map((etf, etfIdx) => html`
                  <span key=${`${m.id}_${etf}`}>
                    <span class="swatch" style=${swatchStyleFor(m.id, etf)}></span>${labelFor(etf)} · ${m.label}
                    ${etfIdx === 0 ? html`<span class="legend-axis">(${axisLabel})</span>` : ''}
                  </span>
                `);
              })}
            </div>
            ${chartData.length === 0 ? html`<div class="empty-msg">No data available for the selected metrics.</div>` : html`
              <${ResponsiveContainer} width="100%" height=${isNarrow ? 380 : 500}>
                <${LineChart} data=${chartData} margin=${{ top: 12, right: 4, left: 0, bottom: 8 }}>
                  <${CartesianGrid} strokeDasharray="3 3" stroke="#1e293b" />
                  <${ReferenceLine}
                    x=${SALE_DATE_NUM}
                    yAxisId=${yAxes[0]?.id}
                    stroke="#94a3b8"
                    strokeWidth=${1}
                    strokeOpacity=${0.5}
                  />
                  <${XAxis}
                    dataKey="dateNum"
                    type="number"
                    ticks=${xTicks}
                    tickFormatter=${(n) => new Date(n * 86400000).getUTCFullYear()}
                    tick=${{fill: '#64748b', fontSize: isNarrow ? 10 : 11}}
                    stroke="#334155"
                    minTickGap=${isNarrow ? 12 : 20}
                    domain=${xDomain}
                  />
                  ${yAxes.map((ax, i) => html`
                    <${YAxis}
                      key=${ax.id}
                      yAxisId=${ax.id}
                      orientation=${ax.orientation}
                      tickFormatter=${fmtAxis(i)}
                      tick=${{fill: '#64748b', fontSize: isNarrow ? 10 : 11}}
                      stroke="#334155"
                      domain=${ax.domain}
                      width=${isNarrow ? 32 : 38}
                    />
                  `)}
                  <${Tooltip}
                    content=${(props) => html`<${CustomTooltip} ...${props} metrics=${selectedMetrics} etfs=${etfs} />`}
                    cursor=${{stroke: '#475569', strokeDasharray: '3 3'}}
                  />
                  ${lines.map((l) => html`
                    <${Line}
                      key=${l.key}
                      type="monotone"
                      dataKey=${l.key}
                      stroke=${l.stroke}
                      strokeDasharray=${l.strokeDasharray}
                      yAxisId=${l.yAxisId}
                      strokeWidth=${1.6}
                      dot=${false}
                      isAnimationActive=${false}
                      connectNulls=${true}
                    />
                  `)}
                </>
              </>
            `}
          </div>

          <div class="card methodology">
            <h2>Methodology</h2>
            <p>
              Drawdown and cumulative return are computed from daily total-return prices. Holdings-derived weights (Mag 7, AI basket, Tech & Comm Services) come from each ETF's SEC filings: monthly Form N-PORT-P from 2019 onwards, quarterly Form N-Q before that — same disclosure, lower frequency, plotted as smooth curves between report dates.
            </p>

            <h3>What's in each basket</h3>
            <ul>
              <li><strong>Mag 7</strong>: ${mag7Str || 'AAPL, AMZN, GOOG, GOOGL, META, MSFT, NVDA, TSLA'}.</li>
              <li><strong>Broader AI basket</strong>: Mag 7 + ${aiBasketExtrasStr || 'AVGO, AMD, ORCL, CRM, NFLX, PLTR, SMCI, DELL, ARM, MU, SNOW'}.</li>
              <li><strong>Tech & Communication Services</strong>: every holding GICS calls "Technology" or "Communication Services", plus Amazon and Tesla. This is broader than the strict tech sector — it captures the full AI-narrative footprint, including companies GICS reclassified out of tech in 2018 (Meta, Alphabet, Netflix).</li>
            </ul>

            <h3>VT international coverage</h3>
            <p>
              VT holds ~10,000 stocks worldwide; ~38% are listed outside the US. The pipeline resolves these via a curated map of ~250 large-cap international names (US ADRs where available, foreign-exchange tickers — <code>.HK</code>, <code>.T</code>, <code>.KS</code>, <code>.PA</code>, etc. — otherwise) and pulls each ticker's GICS sector through Yahoo Finance. About 86% of VT's holding weight is currently classified; the unclassified tail is small-cap names below ~0.05% each.
            </p>
          </div>
        </div>
      `;
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
