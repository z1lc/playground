<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Margin Drawdown Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 40px 20px 60px;
    }
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: #334155;
      border-radius: 3px;
      outline: none;
      margin: 8px 0 0;
      transition: background 0.2s, height 0.2s;
    }
    input[type="range"]:hover {
      background: #475569;
      height: 8px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f59e0b;
      cursor: pointer;
      border: 2px solid #0f172a;
      box-shadow: 0 0 6px rgba(245,158,11,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    input[type="range"]:hover::-webkit-slider-thumb {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(245,158,11,0.6);
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f59e0b;
      cursor: pointer;
      border: 2px solid #0f172a;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    input[type="range"]:hover::-moz-range-thumb {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(245,158,11,0.6);
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom": "https://esm.sh/react-dom@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "htm": "https://esm.sh/htm@3.1.1"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useState, useMemo, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import htm from 'htm';
    const html = htm.bind(React.createElement);

    const MAINTENANCE_MARGIN = 0.25;

    const DRAWDOWN_TICKS = [
      { frequency: 'Every ~1 year', example: '', drawdown: 10 },
      { frequency: 'Every ~5 years', example: '2018 Selloff', drawdown: 20 },
      { frequency: 'Every ~10 years', example: 'COVID', drawdown: 34 },
      { frequency: 'Every ~25 years', example: 'Dot-Com', drawdown: 49 },
      { frequency: 'Every ~40 years', example: 'GFC', drawdown: 57 },
      { frequency: 'Every ~100 years', example: 'Great Depression', drawdown: 86 },
    ];

    function maxSafeBorrow(equity, drawdownPct) {
      const d = drawdownPct / 100;
      const m = MAINTENANCE_MARGIN;
      if (d >= 1) return 0;
      const denom = 1 - (1 - d) * (1 - m);
      if (denom <= 0) return equity; // Reg T cap
      const formulaMax = equity * (1 - d) * (1 - m) / denom;
      return Math.min(equity, formulaMax); // cap at Reg T 50% initial margin
    }

    function fmt(n) {
      return '$' + Math.round(n).toLocaleString('en-US');
    }

    function fmtPct(n) {
      return n.toFixed(1) + '%';
    }

    // --- Styles ---

    const containerStyle = {
      maxWidth: 720,
      margin: '0 auto',
    };

    const cardStyle = {
      background: '#1e293b',
      border: '1px solid #334155',
      borderRadius: 12,
      padding: '24px 28px',
      marginBottom: 24,
    };

    const labelStyle = {
      fontSize: '0.85rem',
      color: '#94a3b8',
      marginBottom: 6,
      display: 'block',
    };

    const inputStyle = {
      background: '#0f172a',
      border: '1px solid #475569',
      borderRadius: 8,
      color: '#e2e8f0',
      padding: '10px 14px',
      fontSize: '1.1rem',
      width: '100%',
      outline: 'none',
      transition: 'border-color 0.2s',
    };

    const statLabelStyle = {
      fontSize: '0.8rem',
      color: '#94a3b8',
      marginBottom: 4,
    };

    const statValueStyle = {
      fontSize: '1.3rem',
      fontWeight: 600,
    };

    // --- Components ---

    function App() {
      const [equity, setEquity] = useState(() => {
        const saved = localStorage.getItem('margin-equity');
        return saved ? Number(saved) : 100000;
      });

      const [drawdown, setDrawdown] = useState(() => {
        const saved = localStorage.getItem('margin-drawdown');
        return saved ? Number(saved) : 34;
      });

      const handleEquityChange = useCallback((e) => {
        const raw = e.target.value.replace(/[^0-9]/g, '');
        const val = raw === '' ? 0 : Number(raw);
        setEquity(val);
        localStorage.setItem('margin-equity', val);
      }, []);

      const handleDrawdownChange = useCallback((e) => {
        const val = Number(e.target.value);
        setDrawdown(val);
        localStorage.setItem('margin-drawdown', val);
      }, []);

      const results = useMemo(() => {
        const borrowed = maxSafeBorrow(equity, drawdown);
        const totalPortfolio = equity + borrowed;
        const postDrawdownPortfolio = totalPortfolio * (1 - drawdown / 100);
        const postDrawdownEquity = postDrawdownPortfolio - borrowed;
        const leverage = equity > 0 ? totalPortfolio / equity : 0;
        const postMarginRatio = postDrawdownPortfolio > 0 ? postDrawdownEquity / postDrawdownPortfolio : 0;
        const regTCapped = borrowed < equity && drawdown > 0;
        return { borrowed, totalPortfolio, postDrawdownPortfolio, postDrawdownEquity, leverage, postMarginRatio, regTCapped };
      }, [equity, drawdown]);

      return html`
        <div style=${containerStyle}>
          <h1 style=${{ fontSize: '1.8rem', fontWeight: 700, marginBottom: 8 }}>Margin Drawdown Calculator</h1>
          <p style=${{ color: '#94a3b8', marginBottom: 32, lineHeight: 1.5 }}>
            How much can you borrow on margin without facing a margin call during a drawdown?
            Assumes broad-based ETFs on Robinhood (25% maintenance margin).
          </p>

          <div style=${cardStyle}>
            <label style=${labelStyle}>Your Equity (Cash Invested)</label>
            <input
              type="text"
              value=${equity === 0 ? '' : '$' + equity.toLocaleString('en-US')}
              onChange=${handleEquityChange}
              style=${inputStyle}
              placeholder="$100,000"
            />
          </div>

          <div style=${cardStyle}>
            <div style=${{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
              <label style=${{ ...labelStyle, marginBottom: 0 }}>Market Drawdown</label>
              <span style=${{ fontSize: '1.3rem', fontWeight: 600, color: '#ef4444' }}>${fmtPct(drawdown)}</span>
            </div>
            <input
              type="range"
              min="0"
              max="100"
              step="1"
              value=${drawdown}
              onChange=${handleDrawdownChange}
            />
            <${TickMarks} drawdown=${drawdown} onChange=${handleDrawdownChange} />
          </div>

          <div style=${{ ...cardStyle, background: '#1a2332' }}>
            <h2 style=${{ fontSize: '1.1rem', fontWeight: 600, marginBottom: 20, color: '#f59e0b' }}>
              Max Safe Borrowing
            </h2>
            <div style=${{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 24 }}>
              <${Stat} label="Max You Can Borrow" value=${fmt(results.borrowed)} color="#3b82f6" />
              <${Stat} label="Total Portfolio" value=${fmt(results.totalPortfolio)} color="#e2e8f0" />
              <${Stat} label="Leverage Ratio" value=${results.leverage.toFixed(2) + 'x'} color="#a78bfa" />
              <${Stat} label="Margin Ratio at Trough" value=${fmtPct(results.postMarginRatio * 100)} color=${results.postMarginRatio <= 0.25 ? '#ef4444' : '#10b981'} />
            </div>

            <${PortfolioBar}
              equity=${equity}
              borrowed=${results.borrowed}
              postEquity=${results.postDrawdownEquity}
              postPortfolio=${results.postDrawdownPortfolio}
              drawdown=${drawdown}
            />

            <div style=${{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginTop: 20 }}>
              <${Stat} label="Portfolio After Drawdown" value=${fmt(results.postDrawdownPortfolio)} color="#94a3b8" />
              <${Stat} label="Equity After Drawdown" value=${fmt(results.postDrawdownEquity)} color=${results.postDrawdownEquity < 0 ? '#ef4444' : '#10b981'} />
            </div>

            ${!results.regTCapped && drawdown > 0 && html`
              <p style=${{ fontSize: '0.8rem', color: '#94a3b8', marginTop: 16, fontStyle: 'italic' }}>
                Borrowing capped at ${fmt(equity)} by Reg T initial margin requirement (50%).
              </p>
            `}
          </div>

          <${HistoricalExamples} />
        </div>
      `;
    }

    const HISTORICAL_EXAMPLES = {
      decade: {
        title: 'Every ~10 years',
        subtitle: '20-35% drawdown',
        color: '#f59e0b',
        events: [
          { year: '2020', name: 'COVID crash', pct: '34%' },
          { year: '2022', name: 'Fed tightening', pct: '25%' },
          { year: '2018', name: 'Q4 selloff', pct: '20%' },
          { year: '2011', name: 'Debt ceiling crisis', pct: '19%' },
        ],
      },
      quarter_century: {
        title: 'Every ~25 years',
        subtitle: '35-55% drawdown',
        color: '#ef4444',
        events: [
          { year: '2000-02', name: 'Dot-com crash', pct: '49%' },
          { year: '1973-74', name: 'Oil embargo', pct: '48%' },
          { year: '1968-70', name: 'Vietnam/inflation', pct: '36%' },
        ],
      },
      half_century: {
        title: 'Every ~40 years',
        subtitle: '55%+ drawdown',
        color: '#dc2626',
        events: [
          { year: '2007-09', name: 'Global financial crisis', pct: '57%' },
          { year: '1929-32', name: 'Great Depression', pct: '86%' },
        ],
      },
    };

    function HistoricalExamples() {
      const colStyle = { flex: 1, minWidth: 0 };
      const headerStyle = (color) => ({ fontSize: '0.95rem', fontWeight: 600, color, marginBottom: 4 });
      const subtitleStyle = { fontSize: '0.75rem', color: '#64748b', marginBottom: 12 };
      const listStyle = { listStyle: 'none', padding: 0, margin: 0 };
      const itemStyle = { fontSize: '0.8rem', color: '#cbd5e1', marginBottom: 8, lineHeight: 1.4 };
      const yearStyle = { color: '#94a3b8', fontSize: '0.75rem' };
      const pctStyle = { color: '#64748b', fontSize: '0.75rem' };

      return html`
        <div style=${{ ...cardStyle, marginTop: 0 }}>
          <h2 style=${{ fontSize: '1.1rem', fontWeight: 600, marginBottom: 20, color: '#e2e8f0' }}>
            Historical S&P 500 Drawdowns
          </h2>
          <div style=${{ display: 'flex', gap: 24 }}>
            ${Object.values(HISTORICAL_EXAMPLES).map(col => html`
              <div key=${col.title} style=${colStyle}>
                <div style=${headerStyle(col.color)}>${col.title}</div>
                <div style=${subtitleStyle}>${col.subtitle}</div>
                <ul style=${listStyle}>
                  ${col.events.map(evt => html`
                    <li key=${evt.year} style=${itemStyle}>
                      <span style=${yearStyle}>${evt.year}</span>${' '}
                      ${evt.name}${' '}
                      <span style=${pctStyle}>(${evt.pct})</span>
                    </li>
                  `)}
                </ul>
              </div>
            `)}
          </div>
        </div>
      `;
    }

    function Stat({ label, value, color }) {
      return html`
        <div>
          <div style=${statLabelStyle}>${label}</div>
          <div style=${{ ...statValueStyle, color }}>${value}</div>
        </div>
      `;
    }

    function TickMarks({ drawdown, onChange }) {
      return html`
        <div style=${{ position: 'relative', height: 58, marginTop: 8 }}>
          ${DRAWDOWN_TICKS.map((tick, i) => {
            const leftPct = (tick.drawdown / 100) * 100;
            const isActive = Math.abs(drawdown - tick.drawdown) < 2;
            const stagger = i % 2 === 1;
            const tickHeight = stagger ? 22 : 10;
            return html`
              <div
                key=${tick.frequency}
                style=${{
                  position: 'absolute',
                  left: leftPct + '%',
                  transform: 'translateX(-50%)',
                  textAlign: 'center',
                  cursor: 'pointer',
                  transition: 'opacity 0.2s',
                  opacity: isActive ? 1 : 0.6,
                }}
                onClick=${() => {
                  onChange({ target: { value: tick.drawdown } });
                }}
              >
                <div style=${{
                  width: 1,
                  height: tickHeight,
                  background: isActive ? '#f59e0b' : '#475569',
                  margin: '0 auto 4px',
                  transition: 'background 0.2s',
                }} />
                <div style=${{
                  fontSize: '0.65rem',
                  color: isActive ? '#f59e0b' : '#94a3b8',
                  whiteSpace: 'nowrap',
                  fontWeight: isActive ? 600 : 400,
                  transition: 'color 0.2s',
                }}>
                  ${tick.frequency}
                </div>
                ${tick.example && html`
                  <div style=${{
                    fontSize: '0.6rem',
                    color: isActive ? '#f59e0b' : '#64748b',
                    transition: 'color 0.2s',
                  }}>
                    ${tick.example} (${tick.drawdown}%)
                  </div>
                `}
                ${!tick.example && html`
                  <div style=${{
                    fontSize: '0.6rem',
                    color: isActive ? '#f59e0b' : '#64748b',
                    transition: 'color 0.2s',
                  }}>
                    ${tick.drawdown}%
                  </div>
                `}
              </div>
            `;
          })}
        </div>
      `;
    }

    function PortfolioBar({ equity, borrowed, postEquity, postPortfolio, drawdown }) {
      const total = equity + borrowed;
      if (total <= 0) return null;
      const eqPct = (equity / total) * 100;
      const brPct = (borrowed / total) * 100;

      const postTotal = total;
      const postEqPct = postPortfolio > 0 ? Math.max(0, (postEquity / postTotal) * 100) : 0;
      const postBrPct = postPortfolio > 0 ? (borrowed / postTotal) * 100 : 0;
      const lostPct = 100 - postEqPct - postBrPct;

      const barHeight = 32;
      const barRadius = 8;
      const barStyle = {
        height: barHeight,
        borderRadius: barRadius,
        overflow: 'hidden',
        display: 'flex',
        marginBottom: 6,
      };

      return html`
        <div>
          <div style=${{ fontSize: '0.75rem', color: '#94a3b8', marginBottom: 6 }}>Before Drawdown</div>
          <div style=${barStyle}>
            <div style=${{
              width: eqPct + '%',
              background: 'linear-gradient(90deg, #10b981, #059669)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: '0.75rem', fontWeight: 600, color: '#fff',
              minWidth: eqPct > 8 ? 0 : undefined,
            }}>
              ${eqPct > 15 ? 'Equity ' + fmt(equity) : ''}
            </div>
            ${borrowed > 0 && html`
              <div style=${{
                width: brPct + '%',
                background: 'linear-gradient(90deg, #3b82f6, #2563eb)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: '0.75rem', fontWeight: 600, color: '#fff',
              }}>
                ${brPct > 15 ? 'Borrowed ' + fmt(borrowed) : ''}
              </div>
            `}
          </div>

          ${drawdown > 0 && html`
            <div style=${{ fontSize: '0.75rem', color: '#94a3b8', marginBottom: 6, marginTop: 12 }}>After ${fmtPct(drawdown)} Drawdown</div>
            <div style=${barStyle}>
              <div style=${{
                width: Math.max(0, postEqPct) + '%',
                background: 'linear-gradient(90deg, #10b981, #059669)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: '0.75rem', fontWeight: 600, color: '#fff',
                transition: 'width 0.3s ease',
              }}>
                ${postEqPct > 15 ? 'Equity ' + fmt(postEquity) : ''}
              </div>
              ${borrowed > 0 && html`
                <div style=${{
                  width: postBrPct + '%',
                  background: 'linear-gradient(90deg, #3b82f6, #2563eb)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: '0.75rem', fontWeight: 600, color: '#fff',
                  transition: 'width 0.3s ease',
                }}>
                  ${postBrPct > 15 ? 'Borrowed ' + fmt(borrowed) : ''}
                </div>
              `}
              <div style=${{
                width: Math.max(0, lostPct) + '%',
                background: 'repeating-linear-gradient(45deg, #ef4444, #ef4444 4px, #dc2626 4px, #dc2626 8px)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: '0.75rem', fontWeight: 600, color: '#fff',
                transition: 'width 0.3s ease',
              }}>
                ${lostPct > 15 ? 'Lost ' + fmt(total - postPortfolio) : ''}
              </div>
            </div>
          `}

          <div style=${{ display: 'flex', gap: 16, marginTop: 8, fontSize: '0.7rem' }}>
            <span><span style=${{ display: 'inline-block', width: 10, height: 10, borderRadius: 2, background: '#10b981', marginRight: 4, verticalAlign: 'middle' }} />Equity</span>
            <span><span style=${{ display: 'inline-block', width: 10, height: 10, borderRadius: 2, background: '#3b82f6', marginRight: 4, verticalAlign: 'middle' }} />Borrowed</span>
            ${drawdown > 0 && html`<span><span style=${{ display: 'inline-block', width: 10, height: 10, borderRadius: 2, background: '#ef4444', marginRight: 4, verticalAlign: 'middle' }} />Lost</span>`}
          </div>
        </div>
      `;
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
