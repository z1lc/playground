    function getScoreDescription(metricKey, value) {
      if (value == null) return '';
      if (metricKey === 'walk_score') {
        if (value >= 90) return "Walker's Paradise \u2014 Daily errands do not require a car";
        if (value >= 70) return "Very Walkable \u2014 Most errands can be accomplished on foot";
        if (value >= 50) return "Somewhat Walkable \u2014 Some errands can be accomplished on foot";
        if (value >= 25) return "Car-Dependent \u2014 Most errands require a car";
        return "Car-Dependent \u2014 Almost all errands require a car";
      }
      if (metricKey === 'transit_score') {
        if (value >= 90) return "Rider's Paradise \u2014 World-class public transportation";
        if (value >= 70) return "Excellent Transit \u2014 Transit is convenient for most trips";
        if (value >= 50) return "Good Transit \u2014 Many nearby public transportation options";
        if (value >= 25) return "Some Transit \u2014 A few nearby public transportation options";
        return "Minimal Transit \u2014 It is possible to get on a bus";
      }
      if (metricKey === 'bike_score') {
        if (value >= 90) return "Biker's Paradise \u2014 Daily errands can be accomplished on a bike";
        if (value >= 70) return "Very Bikeable \u2014 Biking is convenient for most trips";
        if (value >= 50) return "Bikeable \u2014 Some bike infrastructure";
        return "Somewhat Bikeable \u2014 Minimal bike infrastructure";
      }
      return '';
    }

    function fmt(value, format) {
      if (value == null) return '\u2014';
      switch (format) {
        case 'number': return value.toLocaleString('en-US');
        case 'percent': return value.toFixed(1) + '%';
        case 'currency': return '$' + value.toLocaleString('en-US');
        case 'density': return value.toLocaleString('en-US', { maximumFractionDigits: value >= 1000 ? 0 : 1 }) + '/mi\u00B2';
        default: return String(value);
      }
    }

    function Tooltip({ text, children }) {
      const T = useTheme();
      const [show, setShow] = useState(false);
      const [pos, setPos] = useState({ x: 0, y: 0 });
      const onEnter = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        setPos({ x: rect.left + rect.width / 2, y: rect.top });
        setShow(true);
      };
      return html`
        <span
          onMouseEnter=${onEnter}
          onMouseLeave=${() => setShow(false)}
          style=${{ borderBottom: '1px dashed ' + T.hoverLine, cursor: 'help' }}
        >${children}${show ? html`
          <div style=${{
            position: 'fixed', left: Math.max(8, Math.min(window.innerWidth - 8, pos.x)), top: pos.y - 8,
            transform: 'translate(' + (pos.x < 120 ? '0%' : pos.x > window.innerWidth - 120 ? '-100%' : '-50%') + ', -100%)',
            background: T.tooltipBg, color: T.tooltipText, fontSize: 12, fontWeight: 400,
            padding: '6px 10px', borderRadius: 6, maxWidth: Math.min(240, window.innerWidth - 16), whiteSpace: 'pre-line',
            pointerEvents: 'none', zIndex: 1000,
            boxShadow: '0 2px 8px ' + T.tooltipShadow,
          }}>${text}</div>
        ` : null}</span>
      `;
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return {
          granularity: saved?.granularity || 'states',
          expandedTopics: saved?.expandedTopics || SECTION_CONFIG.map(s => s.key),
        };
      } catch {
        return { granularity: 'states', expandedTopics: SECTION_CONFIG.map(s => s.key) };
      }
    }

        textAlign: i === 0 ? 'left' : 'right', padding: '8px 12px', fontSize: 13, fontWeight: 600,
        color: i === 0 ? T.textTertiary : (areaColors || T.colors)[i - 1],

      });
      const subHeaderStyle = {
        fontSize: 15, fontWeight: 600, color: T.textLabel, padding: '18px 12px 8px',
      };

      const hasTableContent = topics.some(t => t.metrics.length > 0 || t.hasTopOrigins || t.hasAirportList || t.hasTeamList || t.hasUniversityList || t.hasFortune500List || t.hasTransitList || t.hasWeatherChart);

      // Estimate row count per topic for repeating headers
      const estRows = (t) => {
        let n = t.metrics.length;
        if (t.hasTopOrigins) n += 3;
        if (t.hasTeamList) n += 10;
        if (t.hasUniversityList) n += 5;
        if (t.hasAirportList) n += 5;
        if (t.hasFortune500List) n += 1;
        if (t.hasTransitList) n += 8;
        return n;
      };

      // Pre-compute which topics need a repeated header before them
      const threshold = isMobile ? 5 : 10;
      let rowsSinceHeader = 0;
      const needsHeader = topics.map((topic, ti) => {
        if (ti === 0) { rowsSinceHeader = estRows(topic); return false; }
        const need = rowsSinceHeader >= threshold;
        if (need) rowsSinceHeader = 0;
        rowsSinceHeader += estRows(topic);
        return need;
      });

      const headerRowWithLabel = (label, tooltip) => html`<tr class="repeated-header">
        <th style=${{ ...thStyle(0), fontSize: 15, fontWeight: 600, color: T.textLabel, verticalAlign: 'bottom' }}>${tooltip ? html`<${Tooltip} text=${tooltip}>${label}</${Tooltip}>` : (label || '')}</th>
        ${areas.map((name, i) => html`<th key=${name} style=${thStyle(i + 1)}>${name.includes('+') ? name.split('+').map((part, j, arr) => html`${part.trim()} ${j < arr.length - 1 ? html`+ <br />` : ''}`) : name}</th>`)}
      </tr>`;

      return html`
        ${topics.map((topic, ti) => html`
          <div key=${topic.key}>
            ${topic.hasPopGrowthChart && areaData[0]?.population_growth ? html`<${PopGrowthChart} areaData=${areaData} areas=${areas} areaColors=${areaColors} />` : null}
            ${topic.hasWeatherChart ? html`<${WeatherChart} areaData=${areaData} areas=${areas} areaColors=${areaColors} />` : null}
            ${topic.key === 'housing' && areaData.some(d => d.housing?.home_price_index) ? html`<${HousingCharts} areaData=${areaData} areas=${areas} areaColors=${areaColors} />` : null}
            ${topic.hasPoliticsCharts ? html`<${PoliticsCharts} areaData=${areaData} areas=${areas} areaColors=${areaColors} granularity=${granularity} />` : null}
            ${topic.hasTurnoutChart && areaData[0]?.voter_turnout?.turnout_history ? html`<${VoterTurnoutChart} areaData=${areaData} areas=${areas} areaColors=${areaColors} />` : null}
          </div>
        `)}
        ${hasTableContent ? html`<table style=${tableStyle}>
          <thead>
            ${headerRowWithLabel(topics[0]?.label || '', topics[0]?.topicTooltip)}
          </thead>
          <tbody>
            ${topics.map((topic, ti) => html`
              ${ti > 0 && showSubHeaders && estRows(topic) > 0 ? (needsHeader[ti]
                ? headerRowWithLabel(topic.label, topic.topicTooltip)
                : html`<tr key=${'subhdr_' + topic.key} class="subhdr">
                    <td colSpan=${nAreas + 1} style=${subHeaderStyle}>${topic.topicTooltip ? html`<${Tooltip} text=${topic.topicTooltip}>${topic.label}</${Tooltip}>` : topic.label}</td>
                  </tr>`
              ) : null}
              <${TopicRows} key=${'rows_' + topic.key} topic=${topic} areas=${areas} areaData=${areaData} areaColors=${areaColors} granularity=${granularity} />
            `)}
          </tbody>
        </table>` : null}
      `;
    }

    function TopicRows({ topic, areas, areaData, areaColors, granularity }) {
      const T = useTheme();
      const C = areaColors || T.colors;
      const tdStyle = (i) => ({
        textAlign: i === 0 ? 'left' : 'right', padding: '10px 12px', fontSize: 14,
        color: i === 0 ? T.textSecondary : T.textPrimary, fontVariantNumeric: 'tabular-nums',
        borderBottom: '1px solid ' + T.borderLight, verticalAlign: 'bottom',
      });

      return html`
            ${topic.hasTransitList ? (() => {
              const robotaxis = areaData.map(d => (d.transit || []).find(t => t.mode === 'Robotaxi'));
              return robotaxis.some(Boolean) ? html`
                <tr key="transit_robotaxi">
                  <td style=${tdStyle(0)}><${Tooltip} text="Autonomous ride-hail service (e.g., Waymo)">Robotaxi<//></td>
                  ${robotaxis.map((s, i) => html`<td key=${i} style=${{ ...tdStyle(i + 1), fontWeight: 500 }}>
                    ${s ? html`<${Tooltip} text=${s.full}><span style=${{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><span style=${{ width: 10, height: 10, borderRadius: '50%', background: s.statusColor, display: 'inline-block' }} />${s.status === 'operating' ? 'Operating' : 'Planned'}</span><//>` : '\u2014'}
                  </td>`)}
                </tr>
              ` : null;
            })() : null}
            ${topic.metrics.map(metric => {
              const values = areaData.map(d => (d[metric.dataKey || topic.key] || {})[metric.key]);
              if (values.every(v => v == null)) return null;
              const maxVal = metric.barMax || (metric.barGroupKeys ? Math.max(...metric.barGroupKeys.flatMap(k => areaData.map(d => (d[metric.dataKey || topic.key] || {})[k])).filter(v => v != null && v > 0)) : Math.max(...values.filter(v => v != null && v > 0)));
              return html`
                <tr key=${metric.key}>
                  <td style=${tdStyle(0)}>${metric.tooltip ? html`<${Tooltip} text=${metric.tooltip}>${metric.label}<//>` : metric.label}</td>
                  ${values.map((val, i) => {
                    const descKey = metric.key + '_desc';
                    const dataObj = areaData[i][metric.dataKey || topic.key] || {};
                    const desc = dataObj[descKey] ? dataObj[descKey] : metric.key.startsWith('cyclist_fatali') && val != null ? dataObj.fatality_coverage || '' : (topic.key === 'walkability' || topic.key === 'transit') ? getScoreDescription(metric.key, val) : (metric.key.startsWith('naep_') && val != null ? (areaData[i][topic.key] || {}).naep_coverage || '' : '');
                    const ratingColors = { protects: '#4a7c3f', punitive: '#c0392b', discretion: '#c8b060' };
                    const ratingLabels = { protects: 'Protects', punitive: 'Punitive', discretion: 'Discretion' };
                    const cellContent = metric.format === 'rating' && val ? html`<span style=${{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><span style=${{ width: 10, height: 10, borderRadius: '50%', background: ratingColors[val] || '#999', display: 'inline-block' }} />${ratingLabels[val] || val}</span>` : fmt(val, metric.format);
                    return html`
                    <td key=${i} style=${tdStyle(i + 1)}>
                      <div>${desc ? html`<${Tooltip} text=${desc}>${cellContent}<//>` : cellContent}${metric.rankKey && val != null ? (() => { const rv = (areaData[i][metric.dataKey || topic.key] || {})[metric.rankKey]; return rv != null ? html`<span style=${{ color: T.textTertiary, fontSize: 12, fontWeight: 400 }}> (${metric.rankKey.includes('percentile') ? rv + (rv % 10 === 1 && rv !== 11 ? 'st' : rv % 10 === 2 && rv !== 12 ? 'nd' : rv % 10 === 3 && rv !== 13 ? 'rd' : 'th') + ' %ile' : '#' + rv})</span>` : ''; })() : ''}</div>
                      ${metric.showBar && val != null && maxVal > 0 ? html`
                        <div style=${{
                          marginTop: 4, height: 4, borderRadius: 2, background: T.barTrack,
                          overflow: 'hidden', display: 'flex', justifyContent: 'flex-end',
                        }}>
                          <div style=${{
                            width: ((metric.format === 'percent' && !metric.barMax && !metric.barRelative) ? val : (val / maxVal * 100)) + '%',
                            height: '100%', borderRadius: 2, background: C[i], opacity: 0.7,
                          }} />
                        </div>
                      ` : null}
                    </td>
                  `;})}
                </tr>
              `;
            })}
            ${topic.hasTopOrigins ? (() => {
              const allOrigins = areaData.map(d => (d[topic.key] || {}).top_origins || []);
              const maxRank = Math.max(...allOrigins.map(o => o.length));
              return Array.from({length: Math.min(maxRank, 3)}, (_, rank) => html`
                <tr key=${'origin_' + rank}>
                  <td style=${{ ...tdStyle(0), color: T.textTertiary, fontSize: 13, fontStyle: 'italic' }}>${rank === 0 ? 'Top origins:' : ''}</td>
                  ${allOrigins.map((origins, i) => {
                    const o = origins[rank];
                    return html`<td key=${i} style=${{ ...tdStyle(i + 1), fontSize: 13, color: T.textSecondary }}>
                      ${o ? html`${COUNTRY_FLAGS[o.name] || ''} <span class="country-name">${o.name} </span>(${o.percent.toFixed(1)}%)` : '\u2014'}
                    </td>`;
                  })}
                </tr>
              `);
            })() : null}
            ${topic.hasAirportList ? (() => {
              const allLists = areaData.map(d => (d[topic.key] || {}).list || []);
              const totals = allLists.map(list => {
                const totalPax = list.reduce((s, a) => s + a.passengers_millions, 0);
                const intlPax = list.reduce((s, a) => s + a.passengers_millions * a.international_percent / 100, 0);
                return { totalPax: Math.round(totalPax * 10) / 10, intlPax: Math.round(intlPax * 10) / 10 };
              });
              const maxPax = Math.max(...totals.map(t => t.totalPax));
              const maxIntl = Math.max(...totals.map(t => t.intlPax));
              const maxLen = Math.max(...allLists.map(l => l.length));
              return html`
                <tr key="airport_total_pax">
                  <td style=${tdStyle(0)}>Total Passengers</td>
                  ${totals.map((t, i) => html`<td key=${i} style=${tdStyle(i + 1)}>
                    <div>${t.totalPax}M</div>
                    <div style=${{ marginTop: 4, height: 4, borderRadius: 2, background: T.barTrack, overflow: 'hidden', display: 'flex', justifyContent: 'flex-end' }}>
                      <div style=${{ width: (t.totalPax / maxPax * 100) + '%', height: '100%', borderRadius: 2, background: C[i], opacity: 0.7 }} />
                    </div>
                  </td>`)}
                </tr>
                <tr key="airport_total_intl">
                  <td style=${tdStyle(0)}>International Passengers</td>
                  ${totals.map((t, i) => html`<td key=${i} style=${tdStyle(i + 1)}>
                    <div>${t.intlPax}M</div>
                    <div style=${{ marginTop: 4, height: 4, borderRadius: 2, background: T.barTrack, overflow: 'hidden', display: 'flex', justifyContent: 'flex-end' }}>
                      <div style=${{ width: (t.intlPax / maxIntl * 100) + '%', height: '100%', borderRadius: 2, background: C[i], opacity: 0.7 }} />
                    </div>
                  </td>`)}
                </tr>
                <tr key="airport_list">
                  <td style=${{ ...tdStyle(0), color: T.textTertiary, fontSize: 13, fontStyle: 'italic' }}>Airports:</td>
                  ${allLists.map((list, i) => html`<td key=${i} style=${{ ...tdStyle(i + 1), fontSize: 13, color: T.textSecondary }}>
                    ${list.map((a, ai) => html`<span key=${ai}><${Tooltip} text=${a.name + ' \u2014 ' + a.passengers_millions + 'M passengers, ' + Math.round(a.passengers_millions * a.international_percent / 100 * 10) / 10 + 'M international'}>${a.code}<//>${ai < list.length - 1 ? ', ' : ''}</span>`)}
                  </td>`)}
                </tr>
              `;
            })() : null}
            ${topic.hasTeamList ? (() => {
              const SPORTS = [['NFL','\uD83C\uDFC8'],['NBA','\uD83C\uDFC0'],['MLB','\u26BE'],['NHL','\uD83C\uDFD2'],['MLS','\u26BD']];
              return SPORTS.flatMap(([sport, emoji]) => {
                const cityAvgs = areaData.map(d => {
                  const entry = (d.sports || []).find(s => s.sport === sport);
                  const teams = entry?.teams || [];
                  if (teams.length === 0) return null;
                  const atts = teams.filter(t => t.att).map(t => t.att);
                  return atts.length > 0 ? Math.round(atts.reduce((a,b) => a+b, 0) / atts.length) : null;
                });
                const maxAtt = Math.max(...cityAvgs.filter(v => v != null));
                return [
                  html`<tr key=${'sport_' + sport}>
                    <td style=${tdStyle(0)}>${emoji} ${sport}</td>
                    ${areaData.map((d, i) => {
                      const entry = (d.sports || []).find(s => s.sport === sport);
                      const teams = entry?.teams || [];
                      return html`<td key=${i} style=${{ ...tdStyle(i + 1), fontWeight: 600 }}>
                        ${teams.length === 0 ? '\u2014' : teams.map((t, ti) => html`
                          <span key=${ti}><span style=${{ color: t.color }}>${t.name}</span>${ti < teams.length - 1 ? ', ' : ''}</span>
                        `)}
                      </td>`;
                    })}
                  </tr>`,
                  html`<tr key=${'att_' + sport} class="att-row">
                    <td style=${{ ...tdStyle(0), color: T.textTertiary, fontSize: 12 }}>Avg Attendance</td>
                    ${cityAvgs.map((avg, i) => html`<td key=${i} style=${tdStyle(i + 1)}>
                      ${avg != null ? html`
                        <div>${avg.toLocaleString('en-US')}</div>
                        <div style=${{ marginTop: 4, height: 4, borderRadius: 2, background: T.barTrack, overflow: 'hidden', display: 'flex', justifyContent: 'flex-end' }}>
                          <div style=${{ width: (avg / maxAtt * 100) + '%', height: '100%', borderRadius: 2, background: C[i], opacity: 0.7 }} />
                        </div>
                      ` : '\u2014'}
                    </td>`)}
                  </tr>`,
                ];
              });
            })() : null}
            ${topic.hasUniversityList ? (() => {
              const allCosts = areaData.flatMap(d => { const unis = d.universities || {}; return [...(unis.public || []), ...(unis.private || [])].map(u => u.cost || 0); });
              const maxCost = Math.max(...allCosts);
              const renderUniRows = (list, prefix, label) => {
                const maxLen = Math.max(...areaData.map(d => { const unis = d.universities || {}; return (unis[list] || []).length; }));
                return Array.from({length: maxLen}, (_, rank) => html`
                  <tr key=${prefix + '_' + rank}>
                    <td style=${{ ...tdStyle(0), borderBottom: 'none', ...(rank === 0 ? { color: T.textTertiary, fontSize: 13, fontStyle: 'italic', paddingTop: prefix === 'priv' ? 8 : 4 } : {}) }}>${rank === 0 ? label : ''}</td>
                    ${areaData.map((d, i) => {
                      const unis = d.universities || {};
                      const u = (unis[list] || [])[rank];
                      const uniTip = u ? (u.full ? u.full + ' in ' + u.loc : '') + (u.ug != null ? '\nUndergrad: ' + u.ug.toLocaleString('en-US') + ' · Grad: ' + u.grad.toLocaleString('en-US') : '') + (u.outOfState ? '\nLocated in a neighboring state but part of this metro area' : '') : '';
                      return html`<td key=${i} style=${{ ...tdStyle(i + 1), fontWeight: 500, borderBottom: 'none' }}>
                        ${u ? html`${u.rank ? html`<span style=${{ fontWeight: 400, color: T.textTertiary, fontSize: 12, fontStyle: u.est ? 'italic' : 'normal' }}>${u.est ? '~' : '#'}${u.rank} </span>` : ''}<${Tooltip} text=${uniTip}>${u.name}<//>${u.outOfState ? '*' : ''}` : ''}
                      </td>`;
                    })}
                  </tr>
                  <tr key=${prefix + '_cost_' + rank}>
                    <td style=${{ ...tdStyle(0), borderBottom: 'none' }}></td>
                    ${areaData.map((d, i) => {
                      const unis = d.universities || {};
                      const u = (unis[list] || [])[rank];
                      return html`<td key=${i} style=${tdStyle(i + 1)}>
                        ${u && u.cost ? html`
                          <div style=${{ fontSize: 13, color: T.textSecondary }}>$${u.cost.toLocaleString('en-US')}</div>
                          <div style=${{ marginTop: 4, height: 4, borderRadius: 2, background: T.barTrack, overflow: 'hidden', display: 'flex', justifyContent: 'flex-end' }}>
                            <div style=${{ width: (u.cost / maxCost * 100) + '%', height: '100%', borderRadius: 2, background: C[i], opacity: 0.7 }} />
                          </div>
                        ` : ''}
                      </td>`;
                    })}
                  </tr>
                `);
              };
              const hasAffordability = areaData.some(d => (d.universities || {}).avg_net_price);
              const affordabilityRow = (key, label, tooltip) => html`
                <tr key=${key}>
                  <td style=${{ ...tdStyle(0), color: T.textTertiary, fontSize: 12 }}>${tooltip ? html`<${Tooltip} text=${tooltip}>${label}<//>` : label}</td>
                  ${areaData.map((d, i) => {
                    const val = (d.universities || {})[key];
                    return html`<td key=${i} style=${tdStyle(i + 1)}>
                      ${val != null ? html`
                        <div style=${{ fontSize: 13, color: T.textSecondary }}>$${val.toLocaleString('en-US')}</div>
                        <div style=${{ marginTop: 4, height: 4, borderRadius: 2, background: T.barTrack, overflow: 'hidden', display: 'flex', justifyContent: 'flex-end' }}>
                          <div style=${{ width: (val / maxCost * 100) + '%', height: '100%', borderRadius: 2, background: C[i], opacity: 0.7 }} />
                        </div>
                      ` : ''}
                    </td>`;
                  })}
                </tr>
              `;
              const costNote = granularity === 'states' ? 'Costs include tuition, fees, room & board' : 'Costs are tuition & fees only';
              return html`
                <tr key="uni_cost_note"><td colSpan=${areas.length + 1} style=${{ padding: '2px 12px 4px', fontSize: 12, color: T.textTertiary, fontStyle: 'italic', borderBottom: 'none' }}>${costNote}${' \u00B7 '}For comparison (2014): Auburn #91, Pitt #62</td></tr>
                ${renderUniRows('public', 'pub', 'Public')}
                ${hasAffordability ? html`
                  ${affordabilityRow('avg_net_price', 'Avg Net Price', 'Average annual net price at public 4-year institutions after grants/scholarships (College Scorecard 2023)')}
                  ${affordabilityRow('avg_student_debt', 'Avg Student Debt', 'Median federal loan debt at graduation from public 4-year institutions (College Scorecard 2023)')}
                ` : null}
                ${renderUniRows('private', 'priv', 'Private')}
              `;
            })() : null}
            ${topic.hasFortune500List ? (() => {
              const allLists = areaData.map(d => (d[topic.key] || {}).fortune_500 || []);
              return html`<tr key="f500">
                <td style=${{ ...tdStyle(0), color: T.textTertiary, fontSize: 13, fontStyle: 'italic', verticalAlign: 'top' }}>Fortune 500 HQs:</td>
                ${allLists.map((list, i) => html`<td key=${i} style=${{ ...tdStyle(i + 1), fontSize: 13, color: T.textSecondary, lineHeight: 1.5, verticalAlign: 'top' }}>
                  ${list.map(c => c.name).join(', ')}
                </td>`)}
              </tr>`;
            })() : null}
            ${topic.hasTransitList ? (() => {
              const modeTooltips = {
                'Heavy Rail': 'Grade-separated, high-capacity subway/metro trains',
                'Light Rail': 'Smaller trains that may share street-level right-of-way',
                'Commuter Rail': 'Long-distance rail connecting suburbs to city center',
                'Bus': 'Fixed-route bus service',
                'Robotaxi': 'Autonomous ride-hail service (e.g., Waymo)',
              };
              const allModes = [...new Set(areaData.flatMap(d => (d.transit || []).map(t => t.mode)))].filter(m => m !== 'Robotaxi');
              const maxRidership = Math.max(...areaData.flatMap(d => (d.transit || []).map(t => t.ridership_millions || 0)));
              return allModes.map(mode => {
                const systems = areaData.map(d => (d.transit || []).find(t => t.mode === mode));
                return html`
                  ${systems.some(s => s && s.status) ? html`
                  <tr key=${'transit_' + mode}>
                    <td style=${tdStyle(0)}><${Tooltip} text=${modeTooltips[mode] || mode}>${mode}<//></td>
                    ${systems.map((s, i) => html`<td key=${i} style=${{ ...tdStyle(i + 1), fontWeight: 500 }}>
                      ${s ? html`<${Tooltip} text=${s.full}><span style=${{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><span style=${{ width: 10, height: 10, borderRadius: '50%', background: s.statusColor, display: 'inline-block' }} />${s.status === 'operating' ? 'Operating' : 'Planned'}</span><//>` : '\u2014'}
                    </td>`)}
                  </tr>
                  ` : html`
                  <tr key=${'transit_' + mode}>
                    <td style=${{ ...tdStyle(0), borderBottom: 'none' }}><${Tooltip} text=${modeTooltips[mode] || mode}>${mode}<//></td>
                    ${systems.map((s, i) => html`<td key=${i} style=${{ ...tdStyle(i + 1), fontWeight: 500, borderBottom: 'none' }}>
                      ${s ? html`<${Tooltip} text=${s.full}>${s.system}<//>` : '\u2014'}
                    </td>`)}
                  </tr>
                  <tr key=${'transit_r_' + mode}>
                    <td style=${{ ...tdStyle(0), color: T.textTertiary, fontSize: 12 }}>Ridership (M/yr)</td>
                    ${systems.map((s, i) => html`<td key=${i} style=${tdStyle(i + 1)}>
                      ${s && s.ridership_millions ? html`
                        <div><${Tooltip} text=${s.miles ? s.miles + ' route mi \u00B7 ' + s.stations + ' stations' : s.routes + ' routes'}>${s.ridership_millions.toLocaleString('en-US')}M<//></div>
                        <div style=${{ marginTop: 4, height: 4, borderRadius: 2, background: T.barTrack, overflow: 'hidden', display: 'flex', justifyContent: 'flex-end' }}>
                          <div style=${{ width: (s.ridership_millions / maxRidership * 100) + '%', height: '100%', borderRadius: 2, background: C[i], opacity: 0.7 }} />
                        </div>
                      ` : '\u2014'}
                    </td>`)}
                  </tr>
                  `}
                `;
              });
            })() : null}
            ${topic.hasTransitList && areaData.some(d => d.neighborhood_transit) ? (() => {
              const badge = (t) => html`
                <${Tooltip} text=${t.full}>
                  <span style=${{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', minWidth: t.line.length > 2 ? 'auto' : 20, height: 20, borderRadius: t.line.length > 2 ? 10 : '50%', background: t.bg, color: t.color, fontSize: t.line.length > 2 ? 9 : 11, fontWeight: 700, padding: t.line.length > 2 ? '0 6px' : 0, lineHeight: 1, cursor: 'help' }}>${t.line}</span>
                <//>`;
              return html`
                <tr key="transit_walk">
                  <td style=${{ ...tdStyle(0), verticalAlign: 'top', borderBottom: 'none', fontSize: 13 }}>Lines within 10-min walk</td>
                  ${areaData.map((d, i) => html`<td key=${i} style=${{ ...tdStyle(i + 1), verticalAlign: 'top', borderBottom: 'none' }}>
                    <div style=${{ display: 'flex', flexWrap: 'wrap', gap: 4, justifyContent: 'flex-end' }}>
                      ${((d.neighborhood_transit || {}).walk || []).map(badge)}
                    </div>
                  </td>`)}
                </tr>
                <tr key="transit_bike">
                  <td style=${{ ...tdStyle(0), verticalAlign: 'top', fontSize: 13 }}>Lines within 10-min bike</td>
                  ${areaData.map((d, i) => html`<td key=${i} style=${{ ...tdStyle(i + 1), verticalAlign: 'top' }}>
                    <div style=${{ display: 'flex', flexWrap: 'wrap', gap: 4, justifyContent: 'flex-end' }}>
                      ${((d.neighborhood_transit || {}).bike || []).map(badge)}
                    </div>
                  </td>`)}
                </tr>
              `;
            })() : null}
            ${topic.hasWeatherChart ? html`
              <tr key="sunrise_link">
                <td style=${{ ...tdStyle(0), borderBottom: 'none' }}>Sunrise & Sunset</td>
                <td colSpan=${areas.length} style=${{ ...tdStyle(1), borderBottom: 'none', textAlign: 'right' }}>
                  <a href="../sunrise-sunset/" style=${{ color: T.accent, textDecoration: 'none' }}>Compare daylight hours \u2192</a>
                </td>
              </tr>
            ` : null}
      `;
    }

    function WeatherChart({ areaData, areas, areaColors }) {
      const T = useTheme();
      const C = areaColors || T.colors;
      const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const MONTHS = ['J','F','M','A','M','J','J','A','S','O','N','D'];
      const W = 600, H = 280, PAD_L = 32, PAD_R = 10, PAD_T = 12, PAD_B = 24;
      const chartW = W - PAD_L - PAD_R, chartH = H - PAD_T - PAD_B;
      const minT = 25, maxT = 95, rangeT = maxT - minT;

      const toY = (temp) => PAD_T + chartH - ((temp - minT) / rangeT) * chartH;
      const toX = (month) => PAD_L + (month / 11) * chartW;

      const [hoverMonth, setHoverMonth] = useState(null);
      const svgRef = React.useRef(null);

      const onMouseMove = (e) => {
        const svg = svgRef.current;
        if (!svg) return;
        const rect = svg.getBoundingClientRect();
        const svgX = (e.clientX - rect.left) / rect.width * W;
        const relX = svgX - PAD_L;
        if (relX < -10 || relX > chartW + 10) { setHoverMonth(null); return; }
        const month = Math.round(relX / chartW * 11);
        setHoverMonth(Math.max(0, Math.min(11, month)));
      };

      const gridTemps = [40, 60, 80];

      // Convert points to a smooth cubic bezier SVG path (catmull-rom spline)
      const smoothPath = (points) => {
        if (points.length < 2) return '';
        const d = ['M' + points[0][0] + ',' + points[0][1]];
        for (let i = 0; i < points.length - 1; i++) {
          const p0 = points[Math.max(0, i - 1)];
          const p1 = points[i];
          const p2 = points[i + 1];
          const p3 = points[Math.min(points.length - 1, i + 2)];
          const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
          const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
          const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
          const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
          d.push('C' + cp1x + ',' + cp1y + ' ' + cp2x + ',' + cp2y + ' ' + p2[0] + ',' + p2[1]);
        }
        return d.join(' ');
      };

      return html`
        <div style=${{ fontSize: 13, fontWeight: 600, color: T.textSecondary, marginBottom: 6 }}>Average Temperature (\u00B0F) by Month</div>
        <div style=${{ position: 'relative' }}>
          <svg ref=${svgRef} viewBox="0 0 ${W} ${H}" style=${{ width: '100%', height: 'auto', marginBottom: 8, display: 'block', cursor: 'crosshair' }}
            onMouseMove=${onMouseMove} onMouseLeave=${() => setHoverMonth(null)}>
            ${gridTemps.map(t => html`
              <line key=${'grid' + t} x1=${PAD_L} y1=${toY(t)} x2=${W - PAD_R} y2=${toY(t)} stroke=${T.gridLine} strokeWidth="1" />
              <text key=${'label' + t} x=${PAD_L - 4} y=${toY(t) + 4} fill=${T.axisText} fontSize="10" textAnchor="end">${t}\u00B0</text>
            `)}
            ${MONTHS.map((m, i) => html`
              <text key=${'month' + i} x=${toX(i)} y=${H - 4} fill=${T.axisText} fontSize="10" textAnchor="middle">${m}</text>
            `)}
            ${areaData.map((d, ci) => {
              const w = d.weather;
              if (!w) return null;
              const highPts = w.highs.map((t, i) => [toX(i), toY(t)]);
              const lowPts = w.lows.map((t, i) => [toX(i), toY(t)]);
              const highLine = smoothPath(highPts);
              const lowLine = smoothPath(lowPts);
              const bandPath = highLine + ' L' + lowPts[lowPts.length - 1].join(',') + ' ' +
                smoothPath(lowPts.slice().reverse()).slice(1) + ' Z';
              return html`
                <g key=${'weather' + ci}>
                  <path d=${bandPath} fill=${C[ci]} opacity="0.15" />
                  <path d=${highLine} fill="none" stroke=${C[ci]} strokeWidth="2" opacity="0.8" />
                  <path d=${lowLine} fill="none" stroke=${C[ci]} strokeWidth="1.5" opacity="0.4" strokeDasharray="4,3" />
                </g>
              `;
            })}
            ${hoverMonth != null ? html`
              <line x1=${toX(hoverMonth)} y1=${PAD_T} x2=${toX(hoverMonth)} y2=${H - PAD_B} stroke=${T.hoverLine} strokeWidth="1" strokeDasharray="3,3" />
              ${areaData.map((d, ci) => {
                const w = d.weather;
                if (!w) return null;
                return html`
                  <g key=${'dots' + ci}>
                    <circle cx=${toX(hoverMonth)} cy=${toY(w.highs[hoverMonth])} r="3.5" fill=${C[ci]} stroke=${T.dotStroke} strokeWidth="1.5" />
                    <circle cx=${toX(hoverMonth)} cy=${toY(w.lows[hoverMonth])} r="3" fill="none" stroke=${C[ci]} strokeWidth="1.5" />
                  </g>
                `;
              })}
            ` : null}
          </svg>
          ${hoverMonth != null ? html`
            <div style=${{
              position: 'absolute', left: '50%', top: 0, transform: 'translateX(-50%)',
              background: T.tooltipBg, color: T.tooltipText, fontSize: 12, padding: '8px 12px',
              borderRadius: 6, pointerEvents: 'none', zIndex: 10,
              boxShadow: '0 2px 8px ' + T.tooltipShadow, whiteSpace: 'nowrap',
            }}>
              <div style=${{ fontWeight: 600, marginBottom: 4 }}>${MONTH_NAMES[hoverMonth]}</div>
              ${areaData.map((d, ci) => {
                const w = d.weather;
                if (!w) return null;
                return html`
                  <div key=${ci} style=${{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 2 }}>
                    <span style=${{ width: 8, height: 8, borderRadius: '50%', background: C[ci], display: 'inline-block' }} />
                    <span>${areas[ci]}: ${w.highs[hoverMonth]}\u00B0F / ${w.lows[hoverMonth]}\u00B0F</span>
                  </div>
                `;
              })}
            </div>
          ` : null}
        </div>
        <div style=${{ display: 'flex', gap: 16, justifyContent: 'center', marginBottom: 12, fontSize: 12, color: T.textSecondary }}>
          ${areas.map((name, i) => html`
            <span key=${name} style=${{ display: 'flex', alignItems: 'center', gap: 4 }}>
              <span style=${{ width: 12, height: 3, background: C[i], borderRadius: 1, display: 'inline-block' }} />
              ${name}
            </span>
          `)}
        </div>
      `;
    }

                maxWidth: 'calc(100vw - 24px)',
              }}>
                <div style=${{ fontWeight: 600, marginBottom: 4 }}>${allYears[hoverIdx]} ${allYears[hoverIdx] % 4 === 0 ? '(Presidential)' : '(Midterm)'}</div>
                ${areaData.map((d, ci) => {
                  const history = d.voter_turnout?.turnout_history || [];
                  const h = history.find(h => h.y === allYears[hoverIdx]);
                  if (!h) return null;
                  return html`
                    <div key=${ci} style=${{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 2 }}>
                      <span style=${{ width: 8, height: 8, borderRadius: '50%', background: C[ci], display: 'inline-block' }} />
                      <span>${areas[ci]}: </span>
                      <span style=${{ fontWeight: 600 }}>${h.t.toFixed(1)}%</span>
                    </div>
                  `;
                })}
              </div>
            ` : null}
          </div>
          <div style=${{ display: 'flex', gap: 16, justifyContent: 'center', marginBottom: 4, fontSize: 12, color: T.textSecondary, flexWrap: 'wrap' }}>
            ${areas.map((name, i) => html`
              <span key=${name} style=${{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <span style=${{ width: 12, height: 3, background: C[i], borderRadius: 1, display: 'inline-block' }} />
                ${name}
              </span>
            `)}
            <span style=${{ display: 'flex', alignItems: 'center', gap: 4, marginLeft: 8 }}>
              <span style=${{ width: 12, height: 0, borderTop: '2px solid ' + T.textSecondary, display: 'inline-block' }} /> Presidential
            </span>
            <span style=${{ display: 'flex', alignItems: 'center', gap: 4 }}>
              <span style=${{ width: 12, height: 0, borderTop: '1.5px dashed ' + T.textSecondary, display: 'inline-block' }} /> Midterm
            </span>
          </div>
        </div>
      `;
    }

    function PoliticsCharts({ areaData, areas, areaColors, granularity }) {
      const T = useTheme();
      const C = areaColors || T.colors;
      const DEM = '#4A7FBF', REP = '#D4564E';
      const [hoverElection, setHoverElection] = useState(null);
      const [hoverCongress, setHoverCongress] = useState(null);

      // --- Presidential dot chart ---
      const elections = areaData[0]?.politics?.presidential || [];
      const PW = 600, PH = 200, P_PAD_L = 36, P_PAD_R = 10, P_PAD_T = 10, P_PAD_B = 24;
      const pChartW = PW - P_PAD_L - P_PAD_R, pChartH = PH - P_PAD_T - P_PAD_B;
      const pMinM = granularity === 'cities' ? 0 : -25;
      const pMaxM = granularity === 'cities' ? 80 : 35;
      const pRange = pMaxM - pMinM;
      const pToX = (i) => P_PAD_L + (i / (elections.length - 1)) * pChartW;
      const pToY = (margin) => P_PAD_T + pChartH - ((margin - pMinM) / pRange) * pChartH;
      const pZeroY = pToY(0);

      const presRef = React.useRef(null);
      const onPresMove = (e) => {
        const svg = presRef.current;
        if (!svg) return;
        const rect = svg.getBoundingClientRect();
        const relX = ((e.clientX - rect.left) / rect.width * PW) - P_PAD_L;
        const idx = Math.round(relX / pChartW * (elections.length - 1));
        setHoverElection(idx >= 0 && idx < elections.length ? idx : null);
      };

      // --- Congressional trend chart ---
      const congresses = areaData[0]?.politics?.congress || [];
      const CW = 600, CH = 200, C_PAD_L = 36, C_PAD_R = 10, C_PAD_T = 10, C_PAD_B = 24;
      const cChartW = CW - C_PAD_L - C_PAD_R, cChartH = CH - C_PAD_T - C_PAD_B;
      const cToX = (i) => C_PAD_L + (i / (congresses.length - 1)) * cChartW;
      const cMinM = -50, cMaxM = 90;
      const cRangeM = cMaxM - cMinM;
      const cToY = (margin) => C_PAD_T + cChartH - ((margin - cMinM) / cRangeM) * cChartH;
      const cZeroY = cToY(0);

      const smoothPath = (points) => {
        if (points.length < 2) return '';
        const d = ['M' + points[0][0] + ',' + points[0][1]];
        for (let i = 0; i < points.length - 1; i++) {
          const p0 = points[Math.max(0, i - 1)];
          const p1 = points[i];
          const p2 = points[i + 1];
          const p3 = points[Math.min(points.length - 1, i + 2)];
          const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
          const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
          const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
          const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
          d.push('C' + cp1x + ',' + cp1y + ' ' + cp2x + ',' + cp2y + ' ' + p2[0] + ',' + p2[1]);
        }
        return d.join(' ');
      };

      const congRef = React.useRef(null);
      const onCongMove = (e) => {
        const svg = congRef.current;
        if (!svg) return;
        const rect = svg.getBoundingClientRect();
        const relX = ((e.clientX - rect.left) / rect.width * CW) - C_PAD_L;
        const idx = Math.round(relX / cChartW * (congresses.length - 1));
        setHoverCongress(idx >= 0 && idx < congresses.length ? idx : null);
      };

      return html`
        <div>
          <div style=${{ fontSize: 13, fontWeight: 600, color: T.textSecondary, marginBottom: 6 }}>Presidential Elections \u2014 Dem Margin (1988\u20132024)</div>
          <div style=${{ position: 'relative' }}>
            <svg ref=${presRef} viewBox="0 0 ${PW} ${PH}" style=${{ width: '100%', height: 'auto', display: 'block', cursor: 'crosshair' }}
              onMouseMove=${onPresMove} onMouseLeave=${() => setHoverElection(null)}>
              ${pZeroY > P_PAD_T ? html`<rect x=${P_PAD_L} y=${P_PAD_T} width=${pChartW} height=${Math.max(0, pZeroY - P_PAD_T)} fill=${DEM} opacity="0.04" />` : null}
              ${pZeroY < P_PAD_T + pChartH ? html`<rect x=${P_PAD_L} y=${Math.max(P_PAD_T, pZeroY)} width=${pChartW} height=${Math.max(0, P_PAD_T + pChartH - Math.max(P_PAD_T, pZeroY))} fill=${REP} opacity="0.04" />` : null}
              ${pMinM <= 0 && pMaxM >= 0 ? html`
                <line x1=${P_PAD_L} y1=${pZeroY} x2=${PW - P_PAD_R} y2=${pZeroY} stroke=${T.axisBaseline} strokeWidth="1" />
                <text x=${P_PAD_L - 4} y=${pZeroY + 4} fill=${T.axisBaseline} fontSize="9" textAnchor="end">0</text>
              ` : null}
              ${Array.from({length: Math.floor((pMaxM - pMinM) / 10) + 1}, (_, i) => Math.ceil(pMinM / 10) * 10 + i * 10).filter(m => m !== 0 && m > pMinM && m < pMaxM).map(m => html`
                <line key=${'pg'+m} x1=${P_PAD_L} y1=${pToY(m)} x2=${PW - P_PAD_R} y2=${pToY(m)} stroke=${T.gridLine} strokeWidth="0.5" />
                <text key=${'pl'+m} x=${P_PAD_L - 4} y=${pToY(m) + 3} fill=${T.axisText} fontSize="8" textAnchor="end">${m > 0 ? '+' + m : m}</text>
              `)}
              ${elections.map((el, ei) => html`
                <text key=${'yr'+ei} x=${pToX(ei)} y=${PH - 4} fill=${T.axisText} fontSize="9" textAnchor="middle">'${String(el.y).slice(2)}</text>
              `)}
              ${areaData.map((d, ci) => {
                const pres = d.politics?.presidential || [];
                const pts = pres.map((el, i) => [pToX(i), pToY(el.d - el.r)]);
                return html`
                  <g key=${'pres' + ci}>
                    <path d=${smoothPath(pts)} fill="none" stroke=${C[ci]} strokeWidth="2" opacity="0.8" />
                  </g>
                `;
              })}
              ${hoverElection != null ? html`
                <line x1=${pToX(hoverElection)} y1=${P_PAD_T} x2=${pToX(hoverElection)} y2=${PH - P_PAD_B} stroke=${T.hoverLine} strokeWidth="1" strokeDasharray="3,3" />
                ${areaData.map((d, ci) => {
                  const el = d.politics?.presidential?.[hoverElection];
                  if (!el) return null;
                  const margin = el.d - el.r;
                  return html`<circle key=${ci} cx=${pToX(hoverElection)} cy=${pToY(margin)} r="4" fill=${C[ci]} stroke=${T.dotStroke} strokeWidth="1.5" />`;
                })}
              ` : null}
            </svg>
            ${hoverElection != null ? html`
              <div style=${{
                position: 'absolute', left: '50%', top: 0, transform: 'translateX(-50%)',
                background: T.tooltipBg, color: T.tooltipText, fontSize: 12, padding: '8px 12px',
                borderRadius: 6, pointerEvents: 'none', zIndex: 10,
                boxShadow: '0 2px 8px ' + T.tooltipShadow, whiteSpace: 'nowrap',
                maxWidth: 'calc(100vw - 24px)',
              }}>
                <div style=${{ fontWeight: 600, marginBottom: 4 }}>${elections[hoverElection]?.y}</div>
                ${areaData.map((d, ci) => {
                  const el = d.politics?.presidential?.[hoverElection];
                  if (!el) return null;
                  const margin = el.d - el.r;
                  const mStr = (margin > 0 ? 'D+' : 'R+') + Math.abs(margin).toFixed(1);
                  return html`
                    <div key=${ci} style=${{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 2 }}>
                      <span style=${{ width: 8, height: 8, borderRadius: '50%', background: C[ci], display: 'inline-block' }} />
                      <span>${areas[ci]}: </span>
                      <span style=${{ color: margin > 0 ? DEM : REP, fontWeight: 600 }}>${mStr}</span>
                      <span style=${{ color: T.hoverLine, fontSize: 11 }}>(${el.d}\u2013${el.r})</span>
                    </div>
                  `;
                })}
              </div>
            ` : null}
          </div>
          <div style=${{ display: 'flex', gap: 16, justifyContent: 'center', marginBottom: 8, fontSize: 12, color: T.textSecondary }}>
            ${areas.map((name, i) => html`
              <span key=${name} style=${{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <span style=${{ width: 12, height: 3, background: C[i], borderRadius: 1, display: 'inline-block' }} />
                ${name}
              </span>
            `)}
          </div>

          ${areaData[0]?.politics?.congress ? html`
          <div style=${{ fontSize: 13, fontWeight: 600, color: T.textSecondary, marginBottom: 6, marginTop: 16 }}>Congressional Delegation \u2014 Dem Margin</div>
          <div style=${{ position: 'relative' }}>
            <svg ref=${congRef} viewBox="0 0 ${CW} ${CH}" style=${{ width: '100%', height: 'auto', display: 'block', cursor: 'crosshair', marginBottom: 8 }}
              onMouseMove=${onCongMove} onMouseLeave=${() => setHoverCongress(null)}>
              ${cMinM <= 0 && cMaxM >= 0 ? html`
                <line x1=${C_PAD_L} y1=${cZeroY} x2=${CW - C_PAD_R} y2=${cZeroY} stroke=${T.axisBaseline} strokeWidth="1" />
                <text x=${C_PAD_L - 4} y=${cZeroY + 4} fill=${T.axisBaseline} fontSize="9" textAnchor="end">0</text>
              ` : null}
              ${Array.from({length: Math.floor((cMaxM - cMinM) / 20) + 1}, (_, i) => Math.ceil(cMinM / 20) * 20 + i * 20).filter(m => m !== 0 && m > cMinM && m < cMaxM).map(m => html`
                <line key=${'cg'+m} x1=${C_PAD_L} y1=${cToY(m)} x2=${CW - C_PAD_R} y2=${cToY(m)} stroke=${T.gridLine} strokeWidth="0.5" />
                <text key=${'cl'+m} x=${C_PAD_L - 4} y=${cToY(m) + 3} fill=${T.axisText} fontSize="8" textAnchor="end">${m > 0 ? '+' + m : m}</text>
              `)}
              ${congresses.map((c, i) => html`
                <text key=${'cyr'+i} x=${cToX(i)} y=${CH - 4} fill=${T.axisText} fontSize="9" textAnchor="middle">'${String(2001 + i * 2).slice(2)}</text>
              `)}
              ${cZeroY > C_PAD_T ? html`<rect x=${C_PAD_L} y=${C_PAD_T} width=${cChartW} height=${Math.max(0, cZeroY - C_PAD_T)} fill=${DEM} opacity="0.04" />` : null}
              ${cZeroY < C_PAD_T + cChartH ? html`<rect x=${C_PAD_L} y=${Math.max(C_PAD_T, cZeroY)} width=${cChartW} height=${Math.max(0, C_PAD_T + cChartH - Math.max(C_PAD_T, cZeroY))} fill=${REP} opacity="0.04" />` : null}
              ${areaData.map((d, ci) => {
                const cong = d.politics?.congress || [];
                const pts = cong.map((c, i) => { const td = c.d+(c.sd||0), tr = c.r+(c.sr||0); return [cToX(i), cToY((td-tr)/(td+tr)*100)]; });
                return html`
                  <g key=${'cong' + ci}>
                    <path d=${smoothPath(pts)} fill="none" stroke=${C[ci]} strokeWidth="2" opacity="0.8" />
                  </g>
                `;
              })}
              ${hoverCongress != null ? html`
                <line x1=${cToX(hoverCongress)} y1=${C_PAD_T} x2=${cToX(hoverCongress)} y2=${CH - C_PAD_B} stroke=${T.hoverLine} strokeWidth="1" strokeDasharray="3,3" />
                ${areaData.map((d, ci) => {
                  const c = d.politics?.congress?.[hoverCongress];
                  if (!c) return null;
                  const td = c.d+(c.sd||0), tr = c.r+(c.sr||0); const pct = (td-tr)/(td+tr)*100;
                  return html`<circle key=${ci} cx=${cToX(hoverCongress)} cy=${cToY(pct)} r="4" fill=${C[ci]} stroke=${T.dotStroke} strokeWidth="1.5" />`;
                })}
              ` : null}
            </svg>
            ${hoverCongress != null ? html`
              <div style=${{
                position: 'absolute', left: '50%', top: 0, transform: 'translateX(-50%)',
                background: T.tooltipBg, color: T.tooltipText, fontSize: 12, padding: '8px 12px',
                borderRadius: 6, pointerEvents: 'none', zIndex: 10,
                boxShadow: '0 2px 8px ' + T.tooltipShadow, whiteSpace: 'nowrap',
                maxWidth: 'calc(100vw - 24px)',
              }}>
                <div style=${{ fontWeight: 600, marginBottom: 4 }}>${2001 + hoverCongress * 2} (${congresses[hoverCongress]?.c}th Congress)</div>
                ${areaData.map((d, ci) => {
                  const c = d.politics?.congress?.[hoverCongress];
                  if (!c) return null;
                  return html`
                    <div key=${ci} style=${{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 2 }}>
                      <span style=${{ width: 8, height: 8, borderRadius: '50%', background: C[ci], display: 'inline-block' }} />
                      <span>${areas[ci]}: </span>
                      ${(() => { const td=c.d+(c.sd||0), tr=c.r+(c.sr||0), m=Math.round((td-tr)/(td+tr)*100); return html`<span style=${{ fontWeight: 600, color: m > 0 ? DEM : REP }}>${(m>0?'D+':'R+')+Math.abs(m)}</span>`; })()}
                      <span style=${{ color: T.hoverLine, fontSize: 11 }}>${' ('}</span>
                      <span style=${{ color: DEM, fontSize: 11 }}>${c.d}D</span>
                      <span style=${{ color: T.hoverLine, fontSize: 11 }}>/</span>
                      <span style=${{ color: REP, fontSize: 11 }}>${c.r}R</span>
                      <span style=${{ color: T.hoverLine, fontSize: 11 }}> House</span>
                      ${c.sd != null ? html`
                        <span style=${{ color: T.hoverLine, fontSize: 11 }}>${' \u00B7 '}</span>
                        <span style=${{ color: DEM, fontSize: 11 }}>${c.sd}D</span>
                        <span style=${{ color: T.hoverLine, fontSize: 11 }}>/</span>
                        <span style=${{ color: REP, fontSize: 11 }}>${c.sr}R</span>
                        <span style=${{ color: T.hoverLine, fontSize: 11 }}> Senate</span>
                      ` : null}
                      <span style=${{ color: T.hoverLine, fontSize: 11 }}>)</span>
                    </div>
                  `;
                })}
              </div>
            ` : null}
          </div>
          ` : null}
        </div>
      `;
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
