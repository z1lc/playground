  <script>
    // Section ordering — most actionable first. Includes both old and
    // new schema keys so the page survives Stage 2 vocabulary churn.
    const ORDER = [
      // list[string] — skills are the centerpiece
      'required_skill_areas',
      'programming_languages',
      'software_tool_familiarity',
      'cloud_and_infra_tools',
      'ai_ml_frameworks',
      // role / engagement axes
      'primary_role_focus', 'primary_role_motion',
      'customer_engagement_depth',
      'solution_customization_level',
      'ai_ml_depth',
      // who's served
      'target_user_persona',
      'target_customer_industry',
      // environment
      'deployment_environment',
      'travel_expectation', 'travel_requirement',
    ];

    // Color palette — same 12-color muted pastels as v1 for visual continuity.
    const PALETTE = [
      { bg: '#fef3c7', fg: '#92400e' },
      { bg: '#dcfce7', fg: '#166534' },
      { bg: '#dbeafe', fg: '#1e40af' },
      { bg: '#fce7f3', fg: '#9d174d' },
      { bg: '#f3e8ff', fg: '#6b21a8' },
      { bg: '#fee2e2', fg: '#991b1b' },
      { bg: '#ccfbf1', fg: '#115e59' },
      { bg: '#ffedd5', fg: '#9a3412' },
      { bg: '#e0e7ff', fg: '#3730a3' },
      { bg: '#ecfccb', fg: '#3f6212' },
      { bg: '#cffafe', fg: '#155e75' },
      { bg: '#fae8ff', fg: '#86198f' },
    ];
    function hashStr(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
      return Math.abs(h);
    }
    const colorFor = v => PALETTE[hashStr(String(v)) % PALETTE.length];

    function escapeHtml(s) {
      return String(s).replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));
    }

    function pct(n, d) {
      if (!d) return 0;
      return Math.round((n / d) * 100);
    }

    function rowHtml({ name, count, sectionMax, total, catKey, value, unstated = false }) {
      const c = unstated ? { bg: '#e5e7eb', fg: '#9ca3af' } : colorFor(name);
      // Bar width is relative to the section max (so the top row fills
      // the bar). Displayed percentage is the share of the full corpus.
      const widthPct = Math.max(2, pct(count, sectionMax));
      const displayPct = pct(count, total);
      // data-cat-key + data-value drive the click-to-explain panel; only
      // emitted for clickable rows (not "(unstated)").
      const dataAttrs = unstated
        ? ''
        : ` data-cat-key="${escapeAttr(catKey)}" data-value="${escapeAttr(value ?? name)}"`;
      return `
        <div class="bar${unstated ? ' unstated' : ''}"${dataAttrs}>
          <div class="bar-fill" style="width:${widthPct}%;background:${c.bg}"></div>
          <div class="bar-content">
            <span class="name">${escapeHtml(name)}</span>
            <span class="stats"><span class="count">${count}</span> · ${displayPct}%</span>
          </div>
        </div>
      `;
    }
    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, '&#39;');
    }

    // ---------- per-type counters ----------

    function countList(listings, key) {
      const m = new Map();
      for (const l of listings) {
        const arr = l.extracted?.[key] || [];
        for (const v of arr) m.set(v, (m.get(v) || 0) + 1);
      }
      return m;
    }
    function countEnum(listings, key) {
      const m = new Map();
      let nullCount = 0;
      for (const l of listings) {
        const v = l.extracted?.[key];
        if (v == null) nullCount++;
        else m.set(v, (m.get(v) || 0) + 1);
      }
      return { values: m, nullCount };
    }
    function countBoolean(listings, key) {
      let t = 0;
      for (const l of listings) if (l.extracted?.[key] === true) t++;
      return t;
    }

    // ---------- section renderers ----------

    function renderListSection(cat, listings) {
      const counts = countList(listings, cat.key);
      const total = listings.length;
      const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1]);
      const sectionMax = sorted.length ? sorted[0][1] : 1;
      const rows = sorted.map(([name, count]) =>
        rowHtml({ name, count, sectionMax, total, catKey: cat.key })
      ).join('');
      return sectionHtml(cat.name, 'A role can match multiple values.', rows);
    }

    function renderEnumSection(cat, listings) {
      const { values, nullCount } = countEnum(listings, cat.key);
      const total = listings.length;
      const declared = (cat.enum_values || []).filter(v => values.has(v));
      const extras = [...values.keys()].filter(v => !declared.includes(v));
      extras.sort((a, b) => values.get(b) - values.get(a));
      const ordered = [...declared, ...extras]
        .map(v => [v, values.get(v)])
        .sort((a, b) => b[1] - a[1]);
      const includeUnstated = nullCount > 0 && cat.key !== 'travel_expectation';
      const sectionMax = Math.max(
        ordered.length ? ordered[0][1] : 0,
        includeUnstated ? nullCount : 0,
        1,
      );
      let rows = ordered.map(([name, count]) =>
        rowHtml({ name, count, sectionMax, total, catKey: cat.key })
      ).join('');
      if (includeUnstated) {
        rows += rowHtml({ name: '(unstated)', count: nullCount, sectionMax, total, unstated: true });
      }
      return sectionHtml(cat.name, 'Each role has at most one value.', rows);
    }

    function renderBooleansSection(cats, listings) {
      const total = listings.length;
      const counts = cats.map(c => ({ cat: c, trueCount: countBoolean(listings, c.key) }));
      const sorted = counts.sort((a, b) => b.trueCount - a.trueCount);
      const sectionMax = Math.max(sorted[0]?.trueCount || 0, 1);
      const rows = sorted.map(({ cat, trueCount }) =>
        rowHtml({ name: cat.name, count: trueCount, sectionMax, total, catKey: cat.key, value: 'true' })
      ).join('');
      return sectionHtml('How often a role is…', 'Share of all roles where the answer is "yes".', rows);
    }

    function sectionHtml(title, denomHint, rowsHtml) {
      return `
        <section class="cat">
          <div class="cat-head">
            <h2>${escapeHtml(title)}</h2>
            <span class="denom-hint">${escapeHtml(denomHint)}</span>
          </div>
          <div class="rows">${rowsHtml}</div>
        </section>
      `;
    }

    // ---------- data loading ----------

    async function loadData() {
      // Try inline first (works on file://).
      const inlineEl = document.getElementById('fde-data');
      if (inlineEl) {
        try {
          const inline = JSON.parse(inlineEl.textContent || '{}');
          if (inline && Array.isArray(inline.listings) && inline.listings.length > 0) {
            return inline;
          }
        } catch (e) {
          console.warn('Inline data parse failed, falling back to fetch:', e);
        }
      }
      // Fallback: fetch (dev mode, before extract.py has populated the inline tag).
      const r = await fetch('data.json');
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }

    // ---------- main ----------

    async function init() {
      let data;
      try {
        data = await loadData();
      } catch (e) {
        document.getElementById('main').innerHTML =
          `<div class="error">Failed to load data: ${escapeHtml(e.message)}</div>`;
        return;
      }

      const listings = data.listings.filter(l => l.extracted);
      const n = listings.length;
      const companies = new Set(listings.map(l => l.company)).size;
      const updated = (data.metadata.stage1_fetched_at || '').slice(0, 10);
      document.getElementById('subtitle').innerHTML =
        `What <strong>${n}</strong> FDE-archetype roles ask for · <strong>${companies}</strong> companies${updated ? ' · updated ' + updated : ''}`;

      // Companies toggle.
      const companyCounts = new Map();
      for (const l of listings) {
        companyCounts.set(l.company, (companyCounts.get(l.company) || 0) + 1);
      }
      const companyList = [...companyCounts.entries()]
        .sort((a, b) => a[0].localeCompare(b[0]));
      document.getElementById('companies-list').innerHTML = companyList.map(([name, count]) =>
        `<span class="pill">${escapeHtml(name)}<span class="listing-count">${count}</span></span>`
      ).join('');
      const toggleBtn = document.getElementById('toggle-companies');
      const listEl = document.getElementById('companies-list');
      toggleBtn.addEventListener('click', () => {
        const showing = !listEl.hasAttribute('hidden');
        if (showing) listEl.setAttribute('hidden', '');
        else listEl.removeAttribute('hidden');
        toggleBtn.textContent = showing ? 'Show companies' : 'Hide companies';
      });

      const main = document.getElementById('main');
      const sections = [];
      const seen = new Set();

      for (const key of ORDER) {
        const cat = data.categories.find(c => c.key === key);
        if (!cat) continue;
        seen.add(key);
        if (cat.type === 'list[string]') sections.push(renderListSection(cat, listings));
        else if (cat.type === 'enum') sections.push(renderEnumSection(cat, listings));
      }

      const bools = data.categories.filter(c => c.type === 'boolean');
      if (bools.length) {
        sections.push(renderBooleansSection(bools, listings));
        bools.forEach(c => seen.add(c.key));
      }

      for (const cat of data.categories) {
        if (seen.has(cat.key)) continue;
        if (cat.type === 'list[string]') sections.push(renderListSection(cat, listings));
        else if (cat.type === 'enum') sections.push(renderEnumSection(cat, listings));
      }

      main.innerHTML = sections.join('');
      attachBarClickHandlers(data);

      const failed = data.metadata.n_listings_failed || 0;
      const stage3 = (data.metadata.stage3_extracted_at || '').slice(0, 10);
      const footerBits = [];
      if (failed > 0) footerBits.push(`${failed} listing(s) failed extraction`);
      if (stage3) footerBits.push(`extracted ${stage3}`);
      footerBits.push(`schema: ${data.categories.length} categories`);
      document.getElementById('footer').textContent = footerBits.join(' · ');
    }

    // ---------- click-to-explain detail panel ----------

    function attachBarClickHandlers(data) {
      const catByKey = new Map(data.categories.map(c => [c.key, c]));
      document.querySelectorAll('section.cat .bar:not(.unstated)').forEach(bar => {
        bar.addEventListener('click', () => onBarClick(bar, data, catByKey));
      });
      window.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeAllDetailPanels();
      });
    }

    function closeAllDetailPanels(scope) {
      const root = scope || document;
      root.querySelectorAll('.bar.active').forEach(b => b.classList.remove('active'));
      root.querySelectorAll('.detail-panel').forEach(p => p.remove());
    }

    function onBarClick(bar, data, catByKey) {
      const wasActive = bar.classList.contains('active');
      const section = bar.closest('section.cat');
      // One open panel per section; close any active sibling first.
      closeAllDetailPanels(section);
      if (wasActive) return;
      const catKey = bar.dataset.catKey;
      const value = bar.dataset.value;
      const cat = catByKey.get(catKey);
      if (!cat) return;
      bar.classList.add('active');
      const html = renderDetailPanel(cat, value, data.listings);
      bar.insertAdjacentHTML('afterend', html);
    }

    function companyLabel(listing) {
      const text = listing.company;
      const arrow = listing.url ? ' ↗' : '';
      if (listing.url) {
        return `<a class="company-link" href="${escapeAttr(listing.url)}" target="_blank" rel="noopener">${escapeHtml(text)}${arrow}</a>`;
      }
      return `<span class="company-link">${escapeHtml(text)}</span>`;
    }

    function renderDetailPanel(cat, value, listings) {
      const matched = [];
      for (const l of listings) {
        if (!l.extracted) continue;
        if (cat.type === 'list[string]') {
          const arr = l.extracted[cat.key] || [];
          if (!arr.includes(value)) continue;
          matched.push({ listing: l, quote: (l.evidence?.[cat.key] || {})[value] || null });
        } else if (cat.type === 'enum') {
          if (l.extracted[cat.key] !== value) continue;
          const ev = l.evidence?.[cat.key];
          matched.push({ listing: l, quote: typeof ev === 'string' ? ev : null });
        } else if (cat.type === 'boolean') {
          if (l.extracted[cat.key] !== true) continue;
          const ev = l.evidence?.[cat.key];
          matched.push({ listing: l, quote: typeof ev === 'string' ? ev : null });
        }
      }
      const quoted = matched.filter(m => m.quote);
      const noQuote = matched.filter(m => !m.quote);
      const byCompany = (a, b) =>
        a.listing.company.localeCompare(b.listing.company) ||
        (a.listing.location || '').localeCompare(b.listing.location || '');
      quoted.sort(byCompany);
      noQuote.sort(byCompany);

      const rows = quoted.map(({ listing, quote }) =>
        `<div class="detail-row">
           <span class="quote">${escapeHtml(quote)}</span>
           ${companyLabel(listing)}
         </div>`
      ).join('');

      let summary = '';
      if (noQuote.length) {
        const links = noQuote.map(({ listing }) => companyLabel(listing)).join(', ');
        summary = `<div class="no-quote-summary"><span class="label">Also tagged, no quote captured:</span>${links}</div>`;
      }

      if (!rows && !summary) {
        return `<div class="detail-panel"><div class="no-quote-summary">No matching listings.</div></div>`;
      }
      return `<div class="detail-panel">${rows}${summary}</div>`;
    }

    init();
  </script>
</body>
</html>
