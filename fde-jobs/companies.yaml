# Fields:
#   name              Company display name.
#   slug              File-safe identifier; used as a key across all stages.
#   employee_estimate Public estimate. ~1k+ companies are kept but flagged.
#   ats               greenhouse | lever | ashby | custom
#                     (custom = HTML fetch + OpenRouter LLM extraction)
#   board_id          ATS-specific board identifier.
#   careers_url       Used for the `custom` ATS path and as a human reference.
#   notes             Free-form context.

