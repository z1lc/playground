<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mortgage Calculator & ROI Projection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 40px 20px 60px;
    }
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: #334155;
      border-radius: 3px;
      outline: none;
      margin: 8px 0 0;
      transition: background 0.2s, height 0.2s;
    }
    input[type="range"]:hover {
      background: #475569;
      height: 8px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f59e0b;
      cursor: pointer;
      border: 2px solid #0f172a;
      box-shadow: 0 0 6px rgba(245,158,11,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    input[type="range"]:hover::-webkit-slider-thumb {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(245,158,11,0.6);
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f59e0b;
      cursor: pointer;
      border: 2px solid #0f172a;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    input[type="range"]:hover::-moz-range-thumb {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(245,158,11,0.6);
    }
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom": "https://esm.sh/react-dom@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
      "htm": "https://esm.sh/htm@3.1.1"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useState, useMemo, useCallback, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { ComposedChart, LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend, ReferenceLine } from 'recharts';
    import htm from 'htm';
    import { formatCurrency, formatAxisCurrency, formatPercent, computeFullScenario } from './mortgage.js';
    const html = htm.bind(React.createElement);

    // --- Components ---

    const cardStyle = {
      background: '#1e293b',
      border: '1px solid #334155',
      borderRadius: 12,
      padding: '24px 28px',
      marginBottom: 24,
    };

    // --- Generic Schedule Picker ---

    const SP = { w: 840, h: 280, ml: 55, mr: 20, mt: 20, mb: 35 };
    const SPL = SP.ml, SPR = SP.w - SP.mr, SPT = SP.mt, SPB = SP.h - SP.mb;
    const SPW = SPR - SPL, SPH = SPB - SPT;

    function spYearToX(yr) { return SPL + ((yr - 1) / 29) * SPW; }
    function spXToYear(x) { return Math.max(1, Math.min(30, Math.round(1 + ((x - SPL) / SPW) * 29))); }
    function spValToY(v, vmin, vmax) { return SPB - ((v - vmin) / (vmax - vmin)) * SPH; }
    function spYToVal(y, vmin, vmax) { return vmin + ((SPB - y) / SPH) * (vmax - vmin); }

    function spClientToSVG(e, svgRef) {
      const rect = svgRef.current.getBoundingClientRect();
      return { x: (e.clientX - rect.left) * (SP.w / rect.width), y: (e.clientY - rect.top) * (SP.h / rect.height) };
    }

    function spBuildPath(cps, vmin, vmax) {
      const sorted = [...cps].sort((a, b) => a.year - b.year);
      let d = `M${spYearToX(sorted[0].year)},${spValToY(sorted[0].value, vmin, vmax)}`;
      for (let i = 1; i < sorted.length; i++) {
        d += ` L${spYearToX(sorted[i].year)},${spValToY(sorted[i].value, vmin, vmax)}`;
      }
      d += ` L${spYearToX(30)},${spValToY(sorted[sorted.length - 1].value, vmin, vmax)}`;
      return d;
    }

    function SchedulePicker({ controlPoints, onChange, holdingYears, label, valueMin, valueMax,
      snapValue, formatLabel, formatPoint, color, storageOpenKey, collapsedSummary, refLinkData, gridValues }) {
      const svgRef = useRef(null);
      const dragIdx = useRef(null);
      const dragMoved = useRef(false);

      const sorted = useMemo(() => [...controlPoints].sort((a, b) => a.year - b.year), [controlPoints]);

      const snap = (y) => {
        const raw = spYToVal(y, valueMin, valueMax);
        return Math.max(valueMin, Math.min(valueMax, snapValue(raw)));
      };

      const onPointerDown = useCallback((e, idx) => {
        if (e.button !== 0) return;
        e.preventDefault();
        e.stopPropagation();
        dragIdx.current = idx;
        dragMoved.current = false;
        svgRef.current.setPointerCapture(e.pointerId);
      }, []);

      const onPointerMove = useCallback((e) => {
        if (dragIdx.current === null) return;
        dragMoved.current = true;
        const pt = spClientToSVG(e, svgRef);
        const idx = dragIdx.current;
        const cp = sorted[idx];
        const newVal = snap(pt.y);
        let newYear = cp.year;
        if (idx !== 0 || cp.year !== 1) {
          newYear = spXToYear(pt.x);
          if (newYear === 1 && idx !== 0) newYear = 2;
          for (let i = 0; i < sorted.length; i++) {
            if (i !== idx && sorted[i].year === newYear) { newYear = cp.year; break; }
          }
        }
        onChange(sorted.map((p, i) => i === idx ? { year: newYear, value: newVal } : p));
      }, [sorted, onChange, snap]);

      const onPointerUp = useCallback(() => { dragIdx.current = null; }, []);

      const onClick = useCallback((e) => {
        if (dragMoved.current) { dragMoved.current = false; return; }
        const pt = spClientToSVG(e, svgRef);
        if (pt.x < SPL || pt.x > SPR || pt.y < SPT || pt.y > SPB) return;
        const yr = spXToYear(pt.x);
        if (sorted.some(p => p.year === yr)) return;
        onChange([...sorted, { year: yr, value: snap(pt.y) }]);
      }, [sorted, onChange, snap]);

      const onRemove = useCallback((e, idx) => {
        e.preventDefault(); e.stopPropagation();
        if (sorted[idx].year === 1) return;
        onChange(sorted.filter((_, i) => i !== idx));
      }, [sorted, onChange]);

      const gridYears = [1, 5, 10, 15, 20, 25, 30];

      return html`
        <div style=${{ marginBottom: 16 }}>
          <div style=${{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 8 }}>
            <span style=${{ color: '#94a3b8', fontWeight: 500, fontSize: 14 }}>${label}${refLinkData ? html`<a href=${refLinkData.url} target="_blank" rel="noopener" style=${refLink()} onClick=${e => e.stopPropagation()}>${refLinkData.text}</a>` : ''}</span>
            <span style=${{ color: '#64748b', fontSize: 12 }}>Click to add \u00b7 drag to adjust \u00b7 right-click to remove</span>
          </div>
          <svg ref=${svgRef} viewBox="0 0 ${SP.w} ${SP.h}" style=${{ width: '100%', cursor: 'crosshair', userSelect: 'none' }}
            onPointerMove=${onPointerMove} onPointerUp=${onPointerUp} onClick=${onClick}>
            <rect x=${SPL} y=${SPT} width=${SPW} height=${SPH} fill="#0f172a" rx="4" />
            ${holdingYears < 30 && html`
              <rect x=${spYearToX(holdingYears + 1)} y=${SPT} width=${SPR - spYearToX(holdingYears + 1)} height=${SPH}
                fill="rgba(100,116,139,0.15)" />
            `}
            ${gridYears.map(yr => html`
              <line key=${'gy' + yr} x1=${spYearToX(yr)} y1=${SPT} x2=${spYearToX(yr)} y2=${SPB} stroke="#334155" strokeDasharray="3 3" />
            `)}
            ${gridValues.map(v => html`
              <line key=${'gv' + v} x1=${SPL} y1=${spValToY(v, valueMin, valueMax)} x2=${SPR} y2=${spValToY(v, valueMin, valueMax)} stroke="#334155" strokeDasharray="3 3" />
            `)}
            ${gridYears.map(yr => html`
              <text key=${'xl' + yr} x=${spYearToX(yr)} y=${SPB + 18} fill="#64748b" fontSize="11" textAnchor="middle">${yr}</text>
            `)}
            ${gridValues.map(v => html`
              <text key=${'yl' + v} x=${SPL - 8} y=${spValToY(v, valueMin, valueMax) + 4} fill="#64748b" fontSize="11" textAnchor="end">${formatLabel(v)}</text>
            `)}
            <path d=${spBuildPath(sorted, valueMin, valueMax)} fill="none" stroke=${color} strokeWidth="2.5" />
            ${sorted.map((cp, i) => html`
              <circle key=${i} cx=${spYearToX(cp.year)} cy=${spValToY(cp.value, valueMin, valueMax)} r=${8}
                fill=${color} stroke="#0f172a" strokeWidth=${2} style=${{ cursor: 'grab' }}
                onPointerDown=${(e) => onPointerDown(e, i)} onContextMenu=${(e) => onRemove(e, i)} />
            `)}
            ${sorted.map((cp, i) => html`
              <text key=${'t' + i} x=${spYearToX(cp.year)} y=${spValToY(cp.value, valueMin, valueMax) - 14}
                fill="#f8fafc" fontSize="11" fontWeight="600" textAnchor="middle"
                style=${{ pointerEvents: 'none' }}>${formatPoint(cp.value)}</text>
            `)}
          </svg>
        </div>
      `;
    }

    function SliderInput({ label, value, onChange, min, max, step, format }) {
      return html`
        <div style=${{ marginBottom: 20 }}>
          <div style=${{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', fontSize: 14 }}>
            <span style=${{ color: '#94a3b8', fontWeight: 500 }}>${label}</span>
            <span style=${{ color: '#f8fafc', fontWeight: 600, fontFamily: 'monospace', fontSize: 15 }}>${format(value)}</span>
          </div>
          <input type="range" min=${min} max=${max} step=${step} value=${value}
            onInput=${e => onChange(parseFloat(e.target.value))} />
        </div>
      `;
    }

    function SummaryCards({ data }) {
      const totalCosts = data.downPayment + data.totalPaid + data.totalPropertyTax + data.totalInsurance + data.totalPMI + data.totalMaintenance - data.totalTaxSavings;
      const cards = [
        { label: 'Total Wealth', value: formatCurrency(data.equity + data.finalStockValue), color: '#8b5cf6' },
        { label: 'Stock Portfolio', value: formatCurrency(data.finalStockValue), color: '#3b82f6' },
        { label: 'Home Value', value: formatCurrency(data.finalHomeValue), color: '#10b981' },
      ];
      const cardStyle2 = { background: '#1e293b', border: '1px solid #334155', borderRadius: 10, padding: '14px 16px' };
      const breakdownItems = [
        { label: 'Down Payment', value: formatCurrency(data.downPayment) },
        { label: 'Principal', value: formatCurrency(data.totalPaid - data.totalInterest) },
        { label: 'Interest', value: formatCurrency(data.totalInterest) },
        { label: 'Property Tax', value: formatCurrency(data.totalPropertyTax) },
        { label: 'Insurance', value: formatCurrency(data.totalInsurance) },
        { label: 'Maintenance', value: formatCurrency(data.totalMaintenance) },
      ];
      if (data.totalPMI > 0) breakdownItems.push({ label: 'PMI', value: formatCurrency(data.totalPMI) });
      if (data.totalTaxSavings > 0) breakdownItems.push({ label: 'Tax Savings', value: '-' + formatCurrency(data.totalTaxSavings), color: '#10b981' });

      return html`
        <div style=${{ marginBottom: 24 }}>
          <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 12 }}>
            ${cards.map((c, i) => html`
              <div key=${i} style=${cardStyle2}>
                <div style=${{ fontSize: 12, color: '#64748b', marginBottom: 6, fontWeight: 500 }}>${c.label}</div>
                <div style=${{ fontSize: 20, fontWeight: 700, color: c.color, fontFamily: 'monospace' }}>${c.value}</div>
              </div>
            `)}
            <div style=${{ background: '#1e293b', border: '1px solid #334155', borderRadius: '10px 10px 0 0', borderBottom: 'none', padding: '14px 16px', marginBottom: -13 }}>
              <div style=${{ fontSize: 12, color: '#64748b', marginBottom: 6, fontWeight: 500 }}>Total Paid</div>
              <div style=${{ fontSize: 20, fontWeight: 700, color: '#ef4444', fontFamily: 'monospace' }}>${formatCurrency(totalCosts)}</div>
            </div>
          </div>
          <div style=${{ background: '#1e293b', border: '1px solid #334155', borderTop: 'none', borderRadius: '10px 0 10px 10px', padding: '12px 16px', marginTop: -1, display: 'flex', gap: 24 }}>
            ${breakdownItems.map((item, i) => html`
              <div key=${i} style=${{ flex: 1 }}>
                <div style=${{ fontSize: 12, color: '#64748b', marginBottom: 4, fontWeight: 500 }}>${item.label}</div>
                <div style=${{ fontSize: 15, fontWeight: 600, color: item.color || '#e2e8f0', fontFamily: 'monospace' }}>${item.value}</div>
              </div>
            `)}
          </div>
        </div>
      `;
    }

    function ChartTooltip({ active, payload, label }) {
      if (!active || !payload?.length) return null;
      return html`
        <div style=${{ background: '#1e293b', border: '1px solid #334155', borderRadius: 8, padding: '10px 14px', fontSize: 13 }}>
          <div style=${{ color: '#94a3b8', marginBottom: 6, fontWeight: 600 }}>Year ${label}</div>
          ${payload.map((p, i) => html`
            <div key=${i} style=${{ color: p.color, display: 'flex', justifyContent: 'space-between', gap: 20, lineHeight: 1.7 }}>
              <span>${p.name}</span>
              <span style=${{ fontFamily: 'monospace' }}>${formatCurrency(p.value)}</span>
            </div>
          `)}
        </div>
      `;
    }

    function BankruptBanner({ schedule }) {
      const bankruptYear = schedule.find(yr => yr.bankrupt);
      if (!bankruptYear) return null;
      return html`
        <div style=${{ background: 'rgba(239,68,68,0.15)', border: '1px solid #ef4444', borderRadius: 8, padding: '8px 16px', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style=${{ fontSize: 20 }}>\u26A0\uFE0F</span>
          <span style=${{ color: '#ef4444', fontSize: 14, fontWeight: 600 }}>Cash depleted in year ${bankruptYear.year} \u2014 housing costs exceed income + savings. This scenario is not sustainable.</span>
        </div>
      `;
    }

    function EquityChart({ data }) {
      const chartData = useMemo(() => data.map(yr => ({
        year: yr.year,
        homeValue: yr.homeValue,
        endingBalance: yr.endingBalance > 10000 ? yr.endingBalance : undefined,
        equity: yr.equity > 10000 ? yr.equity : undefined,
        stockValue: yr.stockValue > 10000 ? yr.stockValue : undefined,
        cashflow: yr.cashflow / 12,
      })), [data]);
      return html`
        <div style=${cardStyle}>
          <${BankruptBanner} schedule=${data} />
          <${ResponsiveContainer} width="100%" height=${400}>
            <${ComposedChart} data=${chartData}>
              <${CartesianGrid} strokeDasharray="3 3" stroke="#334155" />
              <${XAxis} dataKey="year" tick=${{ fill: '#64748b', fontSize: 12 }} />
              <${YAxis} yAxisId="left" scale="log" domain=${[10000, 'auto']} allowDataOverflow=${true}
                tickFormatter=${formatAxisCurrency} tick=${{ fill: '#64748b', fontSize: 12 }} width=${70} />
              <${YAxis} yAxisId="right" orientation="right" tickFormatter=${formatAxisCurrency}
                tick=${{ fill: '#64748b', fontSize: 12 }} width=${70} />
              <${Tooltip} content=${(props) => html`<${ChartTooltip} ...${props} />`} />
              <${Legend} wrapperStyle=${{ fontSize: 13, color: '#94a3b8' }} />
              <${Bar} yAxisId="right" dataKey="cashflow" name="Cashflow" fill="#475569" radius=${[3, 3, 0, 0]} />
              <${ReferenceLine} yAxisId="right" y=${0} stroke="#475569" />
              <${Line} yAxisId="left" type="monotone" dataKey="homeValue" name="Home Value" stroke="#10b981" strokeWidth=${2.5} dot=${false} activeDot=${{ r: 4 }} />
              <${Line} yAxisId="left" type="monotone" dataKey="endingBalance" name="Remaining Balance" stroke="#ef4444" strokeWidth=${2.5} dot=${false} activeDot=${{ r: 4 }} />
              <${Line} yAxisId="left" type="monotone" dataKey="equity" name="Equity" stroke="#f59e0b" strokeWidth=${2.5} dot=${false} activeDot=${{ r: 4 }} />
              <${Line} yAxisId="left" type="monotone" dataKey="stockValue" name="Stock Portfolio" stroke="#3b82f6" strokeWidth=${2.5} dot=${false} activeDot=${{ r: 4 }} strokeDasharray="6 3" />
            <//>
          <//>
        </div>
      `;
    }

    function PaymentTooltip({ active, payload, label }) {
      if (!active || !payload?.length) return null;
      const taxSavings = payload[0]?.payload?.taxSavings;
      const bars = payload.filter(p => p.dataKey !== 'total' && p.dataKey !== 'afterTaxIncome');
      const total = payload.find(p => p.dataKey === 'total');
      const income = payload.find(p => p.dataKey === 'afterTaxIncome');
      return html`
        <div style=${{ background: '#1e293b', border: '1px solid #334155', borderRadius: 8, padding: '10px 14px', fontSize: 13 }}>
          <div style=${{ color: '#94a3b8', marginBottom: 6, fontWeight: 600 }}>Year ${label}</div>
          ${bars.map((p, i) => html`
            <div key=${i} style=${{ color: p.color, display: 'flex', justifyContent: 'space-between', gap: 20, lineHeight: 1.7 }}>
              <span>${p.name}</span>
              <span style=${{ fontFamily: 'monospace' }}>${formatCurrency(p.value)}</span>
            </div>
          `)}
          ${taxSavings > 0 && html`
            <div style=${{ color: '#10b981', display: 'flex', justifyContent: 'space-between', gap: 20, lineHeight: 1.7 }}>
              <span>Tax Savings</span>
              <span style=${{ fontFamily: 'monospace' }}>-${formatCurrency(taxSavings)}</span>
            </div>
          `}
          ${total && html`
            <div style=${{ borderTop: '1px solid #475569', marginTop: 4, paddingTop: 4 }}>
              <div style=${{ color: total.color, display: 'flex', justifyContent: 'space-between', gap: 20, lineHeight: 1.7, fontWeight: 700 }}>
                <span>${total.name}</span>
                <span style=${{ fontFamily: 'monospace' }}>${formatCurrency(total.value)}</span>
              </div>
            </div>
          `}
          ${income && html`
            <div style=${{ color: income.color, display: 'flex', justifyContent: 'space-between', gap: 20, lineHeight: 1.7 }}>
              <span>${income.name}</span>
              <span style=${{ fontFamily: 'monospace' }}>${formatCurrency(income.value)}</span>
            </div>
          `}
        </div>
      `;
    }

    function PaymentChart({ schedule }) {
      const hasPMI = schedule.some(yr => yr.pmi > 0);
      const hasMaint = schedule.some(yr => yr.maintenance > 0);
      const hasIncome = schedule.some(yr => yr.income > 0);
      const data = useMemo(() => schedule.map(yr => ({
        year: yr.year,
        principal: yr.principal / 12,
        interest: yr.interest / 12,
        propertyTax: yr.propertyTax / 12,
        insurance: yr.insurance / 12,
        ...(hasMaint ? { maintenance: yr.maintenance / 12 } : {}),
        ...(hasPMI ? { pmi: yr.pmi / 12 } : {}),
        taxSavings: yr.taxSavings > 0 ? yr.taxSavings / 12 : undefined,
        total: yr.monthlyPayment + yr.propertyTax / 12 + yr.insurance / 12 + yr.maintenance / 12 + yr.pmi / 12 - yr.taxSavings / 12,
        ...(hasIncome ? { afterTaxIncome: yr.afterTaxIncome / 12 } : {}),
      })), [schedule, hasPMI, hasMaint, hasIncome]);
      const lastBar = hasPMI ? 'pmi' : hasMaint ? 'maintenance' : 'insurance';
      return html`
        <div style=${cardStyle}>
          <${BankruptBanner} schedule=${schedule} />
          <${ResponsiveContainer} width="100%" height=${350}>
            <${ComposedChart} data=${data}>
              <${CartesianGrid} strokeDasharray="3 3" stroke="#334155" />
              <${XAxis} dataKey="year" tick=${{ fill: '#64748b', fontSize: 12 }} />
              <${YAxis} tickFormatter=${formatAxisCurrency} tick=${{ fill: '#64748b', fontSize: 12 }} width=${70} />
              <${Tooltip} content=${(props) => html`<${PaymentTooltip} ...${props} />`} />
              <${Legend} wrapperStyle=${{ fontSize: 13, color: '#94a3b8' }} />
              <${Bar} dataKey="principal" name="Principal" stackId="a" fill="#10b981" />
              <${Bar} dataKey="interest" name="Interest" stackId="a" fill="#ef4444" />
              <${Bar} dataKey="propertyTax" name="Property Tax" stackId="a" fill="#8b5cf6" />
              <${Bar} dataKey="insurance" name="Insurance" stackId="a" fill="#06b6d4" radius=${lastBar === 'insurance' ? [3,3,0,0] : [0,0,0,0]} />
              ${hasMaint && html`<${Bar} dataKey="maintenance" name="Maintenance" stackId="a" fill="#ec4899" radius=${lastBar === 'maintenance' ? [3,3,0,0] : [0,0,0,0]} />`}
              ${hasPMI && html`<${Bar} dataKey="pmi" name="PMI" stackId="a" fill="#f97316" radius=${[3, 3, 0, 0]} />`}
              <${Line} type="monotone" dataKey="total" name="Total Costs" stroke="#f8fafc" strokeWidth=${3} dot=${false} activeDot=${{ r: 4 }} />
              ${hasIncome && html`<${Line} type="monotone" dataKey="afterTaxIncome" name="After-Tax Income" stroke="#10b981" strokeWidth=${2} dot=${false} activeDot=${{ r: 4 }} strokeDasharray="6 3" />`}
            <//>
          <//>
        </div>
      `;
    }

    function AmortizationTable({ schedule }) {
      const [open, setOpen] = useState(false);
      const cols = ['Year', 'Rate', 'Mo. Payment', 'Begin Balance', 'Principal', 'Interest', 'End Balance', 'Home Value', 'Equity'];
      const thStyle = { padding: '8px 10px', textAlign: 'right', fontSize: 12, color: '#94a3b8', fontWeight: 600, borderBottom: '1px solid #334155', whiteSpace: 'nowrap' };
      const tdStyle = { padding: '7px 10px', textAlign: 'right', fontSize: 13, fontFamily: 'monospace', borderBottom: '1px solid rgba(51,65,85,0.5)' };

      return html`
        <div style=${cardStyle}>
          <button onClick=${() => setOpen(!open)} style=${{
            background: 'none', border: 'none', color: '#f59e0b', fontSize: 14, fontWeight: 600,
            cursor: 'pointer', fontFamily: 'inherit', padding: 0
          }}>
            ${open ? 'Hide' : 'Show'} Yearly Breakdown ${open ? '\u25B2' : '\u25BC'}
          </button>
          ${open && html`
            <div style=${{ overflowX: 'auto', marginTop: 16 }}>
              <table style=${{ width: '100%', borderCollapse: 'collapse', minWidth: 880 }}>
                <thead>
                  <tr>${cols.map((c, i) => html`<th key=${i} style=${{ ...thStyle, textAlign: i === 0 ? 'left' : 'right' }}>${c}</th>`)}</tr>
                </thead>
                <tbody>
                  ${schedule.map((row, i) => html`
                    <tr key=${i} style=${{ background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)' }}>
                      <td style=${{ ...tdStyle, textAlign: 'left', color: '#f8fafc' }}>${row.year}</td>
                      <td style=${{ ...tdStyle, color: '#f59e0b' }}>${row.rate.toFixed(2)}%</td>
                      <td style=${{ ...tdStyle, color: '#f59e0b' }}>${formatCurrency(row.monthlyPayment)}</td>
                      <td style=${tdStyle}>${formatCurrency(row.beginningBalance)}</td>
                      <td style=${{ ...tdStyle, color: '#10b981' }}>${formatCurrency(row.principal)}</td>
                      <td style=${{ ...tdStyle, color: '#ef4444' }}>${formatCurrency(row.interest)}</td>
                      <td style=${tdStyle}>${formatCurrency(row.endingBalance)}</td>
                      <td style=${{ ...tdStyle, color: '#10b981' }}>${formatCurrency(row.homeValue)}</td>
                      <td style=${{ ...tdStyle, color: '#f59e0b' }}>${formatCurrency(row.equity)}</td>
                    </tr>
                  `)}
                </tbody>
              </table>
            </div>
          `}
        </div>
      `;
    }

    const STORAGE_KEY = 'mortgage-calc-state';
    const DEFAULTS = { price: 800000, totalCash: 300000, downHomePct: 20, ratePoints: [{ year: 1, value: 6.5 }], appreciation: 3.5, years: 12, stockReturn: 10, maintenance: 1, incomePoints: [{ year: 1, value: 200000 }] };
    const refLink = (url) => ({ color: '#475569', fontSize: 11, marginLeft: 6, textDecoration: 'none', borderBottom: '1px dotted #475569' });

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return { ...DEFAULTS, ...JSON.parse(raw) };
      } catch {}
      return DEFAULTS;
    }

    function App() {
      const init = useMemo(loadState, []);
      const [price, setPrice] = useState(init.price);
      const [totalCash, setTotalCash] = useState(init.totalCash);
      const [downHomePct, setDownHomePct] = useState(init.downHomePct ?? (init.downPctOfCash != null && init.price > 0 ? Math.round(init.totalCash * init.downPctOfCash / 100 / init.price * 100) : DEFAULTS.downHomePct));
      const [ratePoints, setRatePoints] = useState(init.ratePoints || (init.controlPoints ? init.controlPoints.map(cp => ({ year: cp.year, value: cp.rate || cp.value })) : DEFAULTS.ratePoints));
      const [appreciation, setAppreciation] = useState(init.appreciation);
      const [years, setYears] = useState(init.years);
      const [stockReturn, setStockReturn] = useState(init.stockReturn);
      const [maintenance, setMaintenance] = useState(init.maintenance);
      const [incomePoints, setIncomePoints] = useState(init.incomePoints || DEFAULTS.incomePoints);
      const [settingsOpen, setSettingsOpen] = useState(() => {
        try { const s = JSON.parse(localStorage.getItem(STORAGE_KEY)); return s?.settingsOpen ?? true; } catch { return true; }
      });
      const [chartTab, setChartTab] = useState('breakdown');

      const downPct = Math.min(downHomePct, price > 0 ? totalCash / price * 100 : 0);
      const downPayment = price * downPct / 100;
      const stockInvestment = totalCash - downPayment;

      // Convert ratePoints {year, value} to {year, rate} for computeFullScenario
      const rateInput = useMemo(() => ratePoints.map(cp => ({ year: cp.year, rate: cp.value })), [ratePoints]);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ price, totalCash, downHomePct, ratePoints, appreciation, years, stockReturn, maintenance, incomePoints }));
      }, [price, totalCash, downHomePct, ratePoints, appreciation, years, stockReturn, maintenance, incomePoints]);

      const result = useMemo(() => computeFullScenario(price, downPayment, stockInvestment, rateInput, appreciation, years, maintenance, incomePoints, stockReturn),
        [price, downPayment, stockInvestment, rateInput, appreciation, years, maintenance, incomePoints, stockReturn]);

      const tabBtn = (id, label) => ({
        background: chartTab === id ? '#f59e0b' : 'rgba(255,255,255,0.06)',
        color: chartTab === id ? '#0f172a' : '#94a3b8',
        border: 'none', borderRadius: 8, padding: '8px 18px',
        fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit',
        transition: 'all 0.15s',
      });

      return html`
        <div style=${{ maxWidth: 900, margin: '0 auto' }}>
          <div style=${{ marginBottom: 32 }}>
            <h1 style=${{ fontSize: '1.8rem', fontWeight: 700, marginBottom: 6 }}>Mortgage Calculator</h1>
            <p style=${{ color: '#64748b', fontSize: 15 }}>Project payments, equity buildup, and investment returns across scenarios</p>
          </div>

          <div style=${cardStyle}>
            <div style=${{ cursor: 'pointer' }}
              onClick=${() => {
                const next = !settingsOpen;
                setSettingsOpen(next);
                try { const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); s.settingsOpen = next; localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
              }}>
              <div style=${{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                <span style=${{ color: '#e2e8f0', fontWeight: 600, fontSize: 18 }}>\u2699\uFE0F Settings <span style=${{ color: '#64748b', fontSize: 13 }}>${settingsOpen ? '\u25B2' : '\u25BC'}</span></span>
                <span style=${{ color: '#64748b', fontSize: 12 }}>${settingsOpen ? 'Click to collapse' : 'Click to expand'}</span>
              </div>
              <div style=${{ maxHeight: settingsOpen ? 0 : 200, opacity: settingsOpen ? 0 : 1, overflow: 'hidden', transition: 'max-height 0.4s ease-in-out, opacity 0.3s ease-in-out' }}>
                <div style=${{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '6px 24px', marginTop: 10, fontSize: 13 }}>
                  ${[
                    ['House Price', formatCurrency(price)],
                    ['Available Cash', formatCurrency(totalCash)],
                    ['Down Payment', Math.round(downPct) + '% (' + formatCurrency(downPayment) + ')'],
                    ['Appreciation', appreciation.toFixed(1) + '%'],
                    ['Time in Home', years + ' year' + (years > 1 ? 's' : '')],
                    ['Maintenance', maintenance.toFixed(1) + '%'],
                    ['Stock Return', stockReturn.toFixed(1) + '%'],
                    ['Mortgage Rate', ratePoints.length === 1 ? ratePoints[0].value.toFixed(2) + '%' : 'avg ' + (result.schedule.reduce((s, yr) => s + yr.rate, 0) / years).toFixed(2) + '%'],
                    ['Income', incomePoints.length === 1 ? formatCurrency(incomePoints[0].value) + '/yr' : 'avg ' + formatCurrency(result.schedule.reduce((s, yr) => s + yr.income, 0) / years) + '/yr'],
                  ].map(([label, val], i) => html`
                    <div key=${i} style=${{ display: 'flex', justifyContent: 'space-between' }}>
                      <span style=${{ color: '#64748b' }}>${label}</span>
                      <span style=${{ color: '#e2e8f0', fontFamily: 'monospace', fontWeight: 600 }}>${val}</span>
                    </div>
                  `)}
                </div>
              </div>
            </div>
            <div style=${{ maxHeight: settingsOpen ? 5000 : 0, opacity: settingsOpen ? 1 : 0, overflow: 'hidden', transition: 'max-height 0.4s ease-in-out, opacity 0.3s ease-in-out', paddingTop: settingsOpen ? 16 : 0 }}>
            <div style=${{ marginBottom: 20 }}>
              <div style=${{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', fontSize: 14 }}>
                <span style=${{ color: '#94a3b8', fontWeight: 500 }}>House Price</span>
                <span style=${{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                  <span style=${{ color: '#94a3b8', fontSize: 15 }}>$</span>
                  <input type="text" value=${price.toLocaleString('en-US')}
                    onClick=${e => e.stopPropagation()}
                    onInput=${e => {
                      const raw = e.target.value.replace(/[^0-9]/g, '');
                      if (raw) setPrice(parseInt(raw, 10));
                    }}
                    style=${{ background: 'transparent', border: 'none', borderBottom: '1px solid #475569', color: '#f8fafc', fontWeight: 600, fontFamily: 'monospace', fontSize: 15, width: 120, textAlign: 'right', outline: 'none', padding: '0 0 2px' }} />
                </span>
              </div>
              <input type="range" min=${500000} max=${2000000} step=${1} value=${Math.min(2000000, Math.max(500000, price))}
                onInput=${e => {
                  const v = parseFloat(e.target.value);
                  setPrice(Math.round(v / 100000) * 100000);
                }} />
            </div>
            <${SliderInput} label="Available Cash" value=${totalCash} onChange=${setTotalCash}
              min=${0} max=${2000000} step=${100000}
              format=${v => formatCurrency(v)} />
            <div style=${{ marginBottom: 20 }}>
              <div style=${{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', fontSize: 14 }}>
                <span style=${{ color: '#94a3b8', fontWeight: 500 }}>Down Payment${downPct < 20
                  ? html` <span style=${{ color: '#ef4444', fontSize: 12, fontWeight: 400, marginLeft: 4 }}>+0.7% PMI until 20% equity</span>`
                  : ''}</span>
                <span style=${{ color: '#f8fafc', fontWeight: 600, fontFamily: 'monospace', fontSize: 15 }}>${Math.round(downPct)}% of home \u2192 ${formatCurrency(downPayment)} down, ${formatCurrency(stockInvestment)} stocks</span>
              </div>
              <input type="range" min=${0} max=${Math.min(100, price > 0 ? Math.round(totalCash / price * 100) : 100)} step=${1}
                value=${Math.round(downPct)}
                onInput=${e => {
                  const maxHomePct = price > 0 ? totalCash / price * 100 : 0;
                  const raw = parseFloat(e.target.value);
                  setDownHomePct(Math.min(Math.round(raw / 5) * 5, maxHomePct));
                }} />
            </div>
            <${SliderInput} label=${html`Annual House Appreciation<a href="https://fred.stlouisfed.org/series/ATXRHTSA" target="_blank" rel="noopener" style=${refLink()}>FRED</a>`} value=${appreciation} onChange=${setAppreciation}
              min=${0} max=${10} step=${0.5}
              format=${v => v.toFixed(1) + '%'} />
            <${SliderInput} label=${html`Time in Home<a href="https://www.redfin.com/news/homeowner-tenure-2022/" target="_blank" rel="noopener" style=${refLink()}>Redfin</a>`} value=${years} onChange=${setYears}
              min=${1} max=${30} step=${1}
              format=${v => v + ' year' + (v > 1 ? 's' : '')} />
            <${SliderInput} label="Maintenance" value=${maintenance} onChange=${setMaintenance}
              min=${0} max=${4} step=${0.5}
              format=${v => v.toFixed(1) + '%'} />
            <${SliderInput} label=${html`Stock Market Return<a href="https://curvo.eu/backtest/en/market-index/msci-world?currency=eur" target="_blank" rel="noopener" style=${refLink()}>MSCI</a>`} value=${stockReturn} onChange=${setStockReturn}
              min=${0} max=${15} step=${0.5}
              format=${v => v.toFixed(1) + '%'} />

            <${SchedulePicker} controlPoints=${ratePoints} onChange=${setRatePoints} holdingYears=${years}
              label="Mortgage Rate Schedule" valueMin=${2.5} valueMax=${10}
              snapValue=${v => Math.round(v * 4) / 4} formatLabel=${v => v + '%'}
              formatPoint=${v => v.toFixed(2) + '%'} color="#f59e0b"
              gridValues=${[3, 4, 5, 6, 7, 8, 9, 10]}
              refLinkData=${{ url: 'https://fred.stlouisfed.org/series/MORTGAGE30US', text: 'FRED' }} />

            <${SchedulePicker} controlPoints=${incomePoints} onChange=${setIncomePoints} holdingYears=${years}
              label="Household Income" valueMin=${0} valueMax=${1000000}
              snapValue=${v => Math.round(v / 50000) * 50000} formatLabel=${v => formatAxisCurrency(v)}
              formatPoint=${v => formatCurrency(v)} color="#10b981"
              gridValues=${[100000, 200000, 300000, 400000, 500000, 600000, 700000, 800000, 900000, 1000000]} />
          </div>
          </div>

          <${SummaryCards} data=${result} />

          <div style=${{ display: 'flex', gap: 8, marginBottom: 16 }}>
            <button style=${tabBtn('breakdown')} onClick=${() => setChartTab('breakdown')}>Monthly Costs</button>
            <button style=${tabBtn('equity')} onClick=${() => setChartTab('equity')}>Equity & Value</button>
          </div>

          ${chartTab === 'breakdown'
            ? html`<${PaymentChart} schedule=${result.schedule} />`
            : html`<${EquityChart} data=${result.schedule} />`}

          <${AmortizationTable} schedule=${result.schedule} />

          <p style=${{ textAlign: 'center', color: '#475569', fontSize: 12, marginTop: 8 }}>
            Assumes 30-year mortgage with configurable rate schedule. Includes 1.0% property tax, 0.4% insurance (Atlanta, GA estimates), 0.7% PMI when equity below 20%, federal progressive tax, and 5.19% Georgia state tax. SALT deduction includes property tax + state income tax (capped at $40k). Excludes closing costs.
          </p>
        </div>
      `;
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
