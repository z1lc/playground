<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stages of Rome</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #1a1210;
      color: #F0E6D3;
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
    }
    h1, h2, h3, .cinzel { font-family: 'Cinzel', 'Palatino Linotype', Georgia, serif; }

    /* ── Pane layout ─────────────────────────────────────────────────── */
    .app {
      display: flex; flex-direction: column;
      gap: 14px; padding: 14px;
      height: 100vh;
    }
    .top-row    { display: flex; gap: 14px; flex: 0 0 auto; }
    .bottom-row { display: flex; gap: 14px; flex: 1 1 auto; min-height: 0; }

    .pane {
      background: #2a2018;
      border: 1px solid rgba(218,165,32,0.15);
      border-radius: 8px;
    }

    /* Title — stylized "Stages of Rome" mark with engraved-gold ROME */
    .title-pane {
      flex: 0 0 200px;
      padding: 12px 16px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(218,165,32,0.06) 0%, transparent 70%),
        #2a2018;
    }
    .title-stages {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem; font-weight: 600;
      color: #DAA520;
      letter-spacing: 6px; text-transform: uppercase;
      padding-left: 6px;  /* compensate for trailing letter-spacing */
      opacity: 0.85;
    }
    .title-flourish {
      display: flex; align-items: center; gap: 8px;
      width: 100%; margin: 4px 0 2px;
    }
    .title-flourish-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(218,165,32,0.55), transparent);
    }
    .title-of {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem; font-style: italic; font-weight: 400;
      color: rgba(240,230,211,0.55);
      letter-spacing: 3px;
    }
    .title-rome {
      font-family: 'Cinzel', serif;
      font-size: 1.65rem; font-weight: 700;
      letter-spacing: 7px;
      padding-left: 7px;
      line-height: 1;
      background: linear-gradient(180deg, #f5d36a 0%, #DAA520 45%, #a07c0e 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 1px 0 rgba(0,0,0,0.55));
    }
    .title-dates {
      font-family: 'Cinzel', serif;
      font-size: 0.53rem; font-weight: 400;
      color: rgba(240,230,211,0.42);
      letter-spacing: 3px; text-transform: uppercase;
      margin-top: 7px;
    }

    .timeline-pane {
      flex: 1 1 auto; min-width: 0;
      padding: 12px 16px 6px;
    }

    .left-pane {
      flex: 0 0 40%; min-height: 0;
      display: flex; flex-direction: column; gap: 12px;
    }
    .site-disclaimer {
      flex: 0 0 auto;
      padding: 6px 10px;
      background: rgba(196, 30, 58, 0.08);
      border: 1px solid rgba(196, 30, 58, 0.35);
      border-radius: 6px;
      font-size: 0.7rem;
      font-style: italic;
      color: rgba(240,230,211,0.7);
      text-align: center;
      letter-spacing: 0.3px;
    }
    .site-disclaimer .disclaimer-icon { margin-right: 4px; }

    .summary-pane {
      flex: 1 1 auto; min-width: 0;
      padding: 22px 26px;
      overflow-y: auto;
    }

    /* ── Timeline ────────────────────────────────────────────────────── */
    .timeline-row { position: relative; height: 36px; margin-bottom: 4px; }
    .era-bar {
      position: absolute; height: 100%; border-radius: 5px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 600;
      color: rgba(255,255,255,0.9); transition: all 0.2s; overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis; padding: 0 8px;
      border: 2px solid transparent;
    }
    .era-bar:hover { filter: brightness(1.2); transform: scaleY(1.08); }
    .era-bar.selected {
      border-color: #DAA520; box-shadow: 0 0 14px rgba(218,165,32,0.45); z-index: 2;
    }
    .timeline-axis {
      position: relative; height: 20px; margin-top: 4px;
      border-top: 1px solid rgba(240,230,211,0.12);
    }
    .axis-tick {
      position: absolute; transform: translateX(-50%);
      font-size: 0.62rem; color: rgba(240,230,211,0.35); top: 4px;
    }
    .axis-tick::before {
      content: ''; position: absolute; top: -6px; left: 50%;
      width: 1px; height: 4px; background: rgba(240,230,211,0.18);
    }

    /* ── Map ─────────────────────────────────────────────────────────── */
    .map-container {
      position: relative; background: #0d1b2a;
      border: 1px solid rgba(218,165,32,0.15);
      border-radius: 8px; overflow: hidden;
      flex: 0 0 auto;
      aspect-ratio: 16 / 9;
      width: 100%;
    }
    .map-container svg { display: block; width: 100%; height: 100%; }
    .map-caption {
      position: absolute; bottom: 5px; right: 8px;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem; letter-spacing: 1px;
      color: rgba(240,230,211,0.7);
      text-shadow: 0 1px 2px rgba(0,0,0,0.85);
      pointer-events: none;
    }

    /* City markers — HTML overlay so labels stay readable at any zoom */
    .city-overlay {
      position: absolute; inset: 0;
      pointer-events: none;
    }
    .city-marker {
      position: absolute;
      transition: opacity 0.5s ease;
    }
    .city-dot {
      position: absolute; left: 0; top: 0;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #DAA520;
      border: 1px solid #1a1210;
      transform: translate(-50%, -50%);
    }
    .city-marker.capital .city-dot {
      width: 9px; height: 9px;
      background: #FFE066;
      box-shadow: 0 0 0 3px rgba(255, 215, 90, 0.4);
    }
    .city-label {
      position: absolute; left: 7px; top: 0;
      transform: translateY(-50%);
      font-family: 'Cinzel', serif;
      font-size: 10px;
      color: #F0E6D3;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,0.9);
      letter-spacing: 0.3px;
    }
    .city-marker.capital .city-label {
      left: 9px;
      font-size: 12.5px;
      font-weight: 700;
      color: #FFE9A8;
    }

    /* ── Stats grid ──────────────────────────────────────────────────── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      flex: 0 0 auto;
    }
    .stat-card {
      background: #2a2018; border: 1px solid rgba(218,165,32,0.1);
      border-radius: 6px; padding: 9px 10px;
    }
    .stat-label {
      font-family: 'Cinzel', serif; font-size: 0.55rem; text-transform: uppercase;
      letter-spacing: 1.3px; color: rgba(240,230,211,0.4); margin-bottom: 4px;
      display: flex; align-items: center; gap: 5px;
    }
    .stat-emoji { font-size: 0.85rem; line-height: 1; letter-spacing: 0; }
    .stat-value { font-size: 0.78rem; color: #F0E6D3; line-height: 1.35; }

    /* Bulleted list with red SPQR-crimson markers — used for the five
       cards that have hover-tooltip explanations on each item. */
    .bulleted-list {
      list-style: none; margin: 0; padding: 0;
      font-size: 0.78rem; line-height: 1.4; color: #F0E6D3;
    }
    .bulleted-list li {
      position: relative; padding-left: 11px;
    }
    .bulleted-list li + li { margin-top: 2px; }
    .bulleted-list li::before {
      content: '•';
      position: absolute; left: 0; top: 0;
      color: #C41E3A;  /* SPQR crimson */
      font-weight: 700;
    }

    /* Tooltip — pure CSS via data-tip attribute */
    .tipped { cursor: help; position: relative; }
    .tipped::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      width: max-content; max-width: 260px;
      padding: 8px 10px;
      background: #1a1210;
      border: 1px solid rgba(218,165,32,0.45);
      border-radius: 4px;
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      font-size: 11.5px; font-weight: 400;
      line-height: 1.45; letter-spacing: 0;
      color: #F0E6D3; text-align: left; white-space: normal;
      pointer-events: none;
      opacity: 0;
      transform: translateX(-50%) translateY(4px);
      transition: opacity 0.15s ease, transform 0.15s ease;
      z-index: 30;
      box-shadow: 0 4px 16px rgba(0,0,0,0.65);
    }
    .tipped:hover::after, .tipped:focus-visible::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Summary content ─────────────────────────────────────────────── */
    .era-title { font-size: 1.6rem; color: #DAA520; margin-bottom: 4px; }
    .era-dates {
      font-size: 0.8rem; color: rgba(240,230,211,0.35); margin-bottom: 16px; letter-spacing: 1px;
    }
    .bluf {
      font-size: 0.98rem; font-weight: 600; color: #F0E6D3; line-height: 1.6;
      margin-bottom: 16px; padding-left: 14px; border-left: 3px solid #C41E3A;
    }
    .summary-text p {
      font-size: 0.9rem; line-height: 1.7; color: rgba(240,230,211,0.72);
      margin-bottom: 12px; text-align: justify;
    }

    /* Custom scrollbar for the summary pane */
    .summary-pane::-webkit-scrollbar { width: 8px; }
    .summary-pane::-webkit-scrollbar-track { background: transparent; }
    .summary-pane::-webkit-scrollbar-thumb {
      background: rgba(218,165,32,0.18); border-radius: 4px;
    }
    .summary-pane::-webkit-scrollbar-thumb:hover { background: rgba(218,165,32,0.32); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="world-data.js"></script>
  <script src="eras-data.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ── Projection ────────────────────────────────────────────────────
    // Lambert Conformal Conic. Same parameters as the pre-baked coastlines
    // in world-data.js, so cities and territory polygons line up exactly.
    const W = window.__WORLD__;
    const RAD = Math.PI / 180;
    const _P = W.projection;
    const _phi1 = _P.lat1*RAD, _phi2 = _P.lat2*RAD, _phi0 = _P.lat0*RAD, _lam0 = _P.lon0*RAD;
    const _n = Math.log(Math.cos(_phi1)/Math.cos(_phi2)) /
               Math.log(Math.tan(Math.PI/4 + _phi2/2)/Math.tan(Math.PI/4 + _phi1/2));
    const _F = Math.cos(_phi1) * Math.pow(Math.tan(Math.PI/4 + _phi1/2), _n) / _n;
    const _rho0 = _F / Math.pow(Math.tan(Math.PI/4 + _phi0/2), _n);

    function project([lon, lat]) {
      const phi = lat*RAD, lam = lon*RAD;
      const rho = _F / Math.pow(Math.tan(Math.PI/4 + phi/2), _n);
      const x = rho * Math.sin(_n*(lam - _lam0));
      // d3/SVG: y grows down. Negate the textbook LCC y to match.
      const y = rho * Math.cos(_n*(lam - _lam0)) - _rho0;
      return [x*_P.scale + _P.tx, y*_P.scale + _P.ty];
    }

    // ── Data ──────────────────────────────────────────────────────────
    const ERAS = window.__ERAS__;
    const CITIES = window.__CITIES__;
    const TIMELINE_MIN = -753;
    const TIMELINE_MAX = 1453;
    const TIMELINE_RANGE = TIMELINE_MAX - TIMELINE_MIN;
    const STORAGE_KEY = 'rome.selectedEra';
    const AXIS_TICKS = [-750, -500, -250, 0, 250, 500, 750, 1000, 1250, 1450];

    function formatYear(y) {
      if (y < 0) return Math.abs(y) + ' BC';
      if (y === 0) return '1 BC';
      return y + ' AD';
    }

    // ── Components ────────────────────────────────────────────────────

    function Timeline({ selectedEra, onSelect }) {
      const pct = (year) => ((year - TIMELINE_MIN) / TIMELINE_RANGE) * 100;
      const maxRow = Math.max(...ERAS.map(e => e.row));

      return (
        <div className="timeline">
          {Array.from({ length: maxRow + 1 }, (_, row) => (
            <div className="timeline-row" key={row}>
              {ERAS.filter(e => e.row === row).map(era => (
                <div
                  key={era.id}
                  className={`era-bar cinzel${selectedEra === era.id ? ' selected' : ''}`}
                  style={{
                    left: pct(era.startYear) + '%',
                    width: pct(era.endYear) - pct(era.startYear) + '%',
                    background: era.color
                  }}
                  onClick={() => onSelect(era.id)}
                  title={`${era.name} (${formatYear(era.startYear)} – ${formatYear(era.endYear)})`}
                >
                  {era.shortName}
                </div>
              ))}
            </div>
          ))}
          <div className="timeline-axis">
            {AXIS_TICKS.map(year => (
              <div key={year} className="axis-tick" style={{ left: pct(year) + '%' }}>
                {year === 0 ? '1 AD'
                  : year < 0 ? Math.abs(year) + ' BC'
                  : year >= 1000 ? String(year)
                  : year + ' AD'}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Compute the SVG viewBox [x, y, w, h] for an era's geographic bbox,
    // by projecting the bbox's lon/lat corners and padding by 4%.
    function computeViewBox(bbox) {
      if (!bbox) return [0, 0, W.projection.width, W.projection.height];
      const [lonMin, latMin, lonMax, latMax] = bbox;
      // Sample the bbox edges (not just corners) — LCC is conformal so
      // edge midpoints can extend further than corners under projection.
      const samples = [];
      const N = 8;
      for (let i = 0; i <= N; i++) {
        const t = i / N;
        samples.push([lonMin + t*(lonMax-lonMin), latMin]);
        samples.push([lonMin + t*(lonMax-lonMin), latMax]);
        samples.push([lonMin, latMin + t*(latMax-latMin)]);
        samples.push([lonMax, latMin + t*(latMax-latMin)]);
      }
      const projected = samples.map(p => project(p));
      let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
      for (const [x, y] of projected) {
        if (x < xMin) xMin = x; if (x > xMax) xMax = x;
        if (y < yMin) yMin = y; if (y > yMax) yMax = y;
      }
      const padX = (xMax - xMin) * 0.04;
      const padY = (yMax - yMin) * 0.04;
      return [xMin - padX, yMin - padY, xMax - xMin + 2*padX, yMax - yMin + 2*padY];
    }

    // Smoothly tween an SVG viewBox from one [x,y,w,h] to another over
    // ~600ms with ease-in-out. Uses requestAnimationFrame.
    function useAnimatedViewBox(target) {
      const [vb, setVb] = useState(target);
      const startRef = React.useRef(null);
      const fromRef = React.useRef(target);
      const toRef = React.useRef(target);
      useEffect(() => {
        // Animate from current displayed vb to new target
        fromRef.current = vb.slice();
        toRef.current = target.slice();
        startRef.current = performance.now();
        let raf;
        const DUR = 700;
        const ease = t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
        const step = (now) => {
          const t = Math.min(1, (now - startRef.current) / DUR);
          const k = ease(t);
          const next = fromRef.current.map((v, i) => v + (toRef.current[i] - v) * k);
          setVb(next);
          if (t < 1) raf = requestAnimationFrame(step);
        };
        raf = requestAnimationFrame(step);
        return () => raf && cancelAnimationFrame(raf);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [target.join(',')]);
      return vb;
    }

    function RomeMap({ selectedEra }) {
      // Project each era's territory rings once.
      const projectedEras = useMemo(() => ERAS.map(era => ({
        ...era,
        projectedRings: era.territory.map(ring =>
          ring.map(p => project(p).join(',')).join(' ')
        )
      })), []);

      // Project city positions once.
      const projectedCities = useMemo(() => CITIES.map(c => {
        const [x, y] = project([c.lon, c.lat]);
        return { ...c, x, y };
      }), []);

      const era = ERAS.find(e => e.id === selectedEra);
      const target = useMemo(() => computeViewBox(era?.bbox), [selectedEra]);
      const viewBox = useAnimatedViewBox(target);
      const capitalNames = useMemo(
        () => new Set((era?.stats?.capitals || []).map(c => c.name)),
        [selectedEra]
      );
      // A city is "always shown" if it served as a capital in any era; the
      // overlay still renders all cities but fades out ones not relevant to
      // the selected era.
      const everCapital = useMemo(() => {
        const set = new Set();
        for (const e of ERAS) for (const c of (e.stats?.capitals || [])) set.add(c.name);
        return set;
      }, []);

      // Track the map container's pixel size so we can position HTML
      // city markers exactly on top of their projected SVG positions.
      const containerRef = React.useRef(null);
      const [containerSize, setContainerSize] = useState({ w: 0, h: 0 });
      useEffect(() => {
        if (!containerRef.current) return;
        const ro = new ResizeObserver(([entry]) => {
          setContainerSize({
            w: entry.contentRect.width,
            h: entry.contentRect.height
          });
        });
        ro.observe(containerRef.current);
        return () => ro.disconnect();
      }, []);

      // Map projected city coords (viewBox units) → screen pixels, accounting
      // for SVG `preserveAspectRatio="xMidYMid meet"` letterboxing inside the
      // 16:9 container.
      const cityScreen = useMemo(() => {
        const [vx, vy, vw, vh] = viewBox;
        const { w: cw, h: ch } = containerSize;
        if (!cw || !ch || !vw || !vh) return [];
        const vbAspect = vw / vh;
        const containerAspect = cw / ch;
        let displayW, displayH, padX, padY;
        if (vbAspect > containerAspect) {
          displayW = cw;
          displayH = cw / vbAspect;
          padX = 0;
          padY = (ch - displayH) / 2;
        } else {
          displayH = ch;
          displayW = ch * vbAspect;
          padX = (cw - displayW) / 2;
          padY = 0;
        }
        return projectedCities.map(c => ({
          ...c,
          sx: padX + (c.x - vx) / vw * displayW,
          sy: padY + (c.y - vy) / vh * displayH,
        }));
      }, [viewBox, containerSize, projectedCities]);

      return (
        <div ref={containerRef} className="map-container">
          <svg viewBox={viewBox.join(' ')} preserveAspectRatio="xMidYMid meet">
            <defs>
              <mask id="land-mask" maskUnits="userSpaceOnUse"
                    x={-W.projection.width} y={-W.projection.height}
                    width={3*W.projection.width} height={3*W.projection.height}>
                <rect x={-W.projection.width} y={-W.projection.height}
                      width={3*W.projection.width} height={3*W.projection.height} fill="black"/>
                {W.landPaths.map((d, i) =>
                  <path key={i} d={d} fill="white" fillRule="evenodd"/>)}
              </mask>
            </defs>

            {/* Sea (covers viewBox at any zoom) */}
            <rect x={-W.projection.width} y={-W.projection.height}
                  width={3*W.projection.width} height={3*W.projection.height} fill="#0d1b2a"/>

            {/* Land base color */}
            {W.landPaths.map((d, i) =>
              <path key={i} d={d} fill="#3d2e21" fillRule="evenodd"/>)}

            {/* Territory overlays — masked to land */}
            <g mask="url(#land-mask)">
              {projectedEras.map(era => (
                <g key={era.id}
                   opacity={era.id === selectedEra ? 0.7 : 0}
                   style={{ transition: 'opacity 0.5s ease' }}>
                  {era.projectedRings.map((points, i) =>
                    <polygon key={i} points={points} fill={era.color}/>)}
                </g>
              ))}
            </g>

            {/* Coastline outline for crispness */}
            {W.landPaths.map((d, i) =>
              <path key={i} d={d} fill="none"
                    stroke="rgba(218,165,32,0.28)" strokeWidth="0.6"
                    vectorEffect="non-scaling-stroke"/>)}
          </svg>

          {era?.peakDate && (
            <div className="map-caption">{era.peakDate}</div>
          )}

          {/* Cities — HTML overlay so labels stay readable at any zoom.
              Capitals (in any era) are always shown; other cities fade in
              only for the eras they were significant in. */}
          <div className="city-overlay">
            {cityScreen.map(c => {
              const isCapital = capitalNames.has(c.name);
              const visible = everCapital.has(c.name)
                || (c.eras && c.eras.includes(selectedEra));
              return (
                <div key={c.name}
                     className={`city-marker${isCapital ? ' capital' : ''}`}
                     style={{
                       left: `${c.sx}px`,
                       top: `${c.sy}px`,
                       opacity: visible ? 1 : 0
                     }}>
                  <div className="city-dot" />
                  <div className="city-label">{c.name}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // Renders a list of {label/name, description} items. With a single item
    // renders it as plain stat text (with hover tooltip); with 2+ items
    // renders a red-bulleted list where each bullet has its own tooltip.
    function TooltipList({ items, getLabel }) {
      if (items.length === 1) {
        const it = items[0];
        return (
          <div className="stat-value tipped" data-tip={it.description} tabIndex="0">
            {getLabel(it)}
          </div>
        );
      }
      return (
        <ul className="bulleted-list">
          {items.map((it, i) => (
            <li key={i} className="tipped" data-tip={it.description} tabIndex="0">
              {getLabel(it)}
            </li>
          ))}
        </ul>
      );
    }
    const labelKey = it => it.label;
    const nameKey  = it => it.name;
    const plur = (arr, sing, plural) => arr.length > 1 ? plural : sing;

    function EraStats({ era }) {
      return (
        <div className="stats-grid">
          <div className="stat-card">
            <div className="stat-label"><span className="stat-emoji">👥</span> Peak Population</div>
            <div className="stat-value">{era.stats.population}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label"><span className="stat-emoji">🗺️</span> Territory</div>
            <div className="stat-value">{era.stats.territory}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label"><span className="stat-emoji">🛐</span> {plur(era.stats.religion, 'State Religion', 'State Religions')}</div>
            <TooltipList items={era.stats.religion} getLabel={labelKey}/>
          </div>
          <div className="stat-card">
            <div className="stat-label"><span className="stat-emoji">📍</span> {plur(era.stats.capitals, 'Capital', 'Capitals')}</div>
            <div className="stat-value">
              {era.stats.capitals.map((c, i) => (
                <div key={i}>
                  <strong>{c.name}</strong>{c.dates && <span style={{ color: 'rgba(240,230,211,0.55)' }}> ({c.dates})</span>}
                </div>
              ))}
            </div>
          </div>
          <div className="stat-card">
            <div className="stat-label"><span className="stat-emoji">🏛️</span> {plur(era.stats.government, 'Government', 'Governments')}</div>
            <TooltipList items={era.stats.government} getLabel={labelKey}/>
          </div>
          <div className="stat-card">
            <div className="stat-label"><span className="stat-emoji">🗣️</span> {plur(era.stats.languages, 'Language', 'Languages')}</div>
            {era.stats.languages.length === 1 ? (
              <div className="stat-value">{era.stats.languages[0]}</div>
            ) : (
              <ul className="bulleted-list">
                {era.stats.languages.map((l, i) => <li key={i}>{l}</li>)}
              </ul>
            )}
          </div>
          <div className="stat-card">
            <div className="stat-label"><span className="stat-emoji">⚔️</span> {plur(era.stats.rival, 'Chief Rival', 'Chief Rivals')}</div>
            <TooltipList items={era.stats.rival} getLabel={r => (
              <React.Fragment>
                {r.label}
                {r.region && <span style={{ color: 'rgba(240,230,211,0.55)' }}> ({r.region})</span>}
              </React.Fragment>
            )}/>
          </div>
          <div className="stat-card">
            <div className="stat-label"><span className="stat-emoji">🗿</span> {plur(era.stats.monument, 'Signature Work', 'Signature Works')}</div>
            <TooltipList items={era.stats.monument} getLabel={labelKey}/>
          </div>
          <div className="stat-card">
            <div className="stat-label"><span className="stat-emoji">👑</span> {plur(era.stats.leaders, 'Notable Leader', 'Notable Leaders')}</div>
            <TooltipList items={era.stats.leaders} getLabel={nameKey}/>
          </div>
        </div>
      );
    }

    function SummaryPane({ era }) {
      return (
        <div className="pane summary-pane">
          <h2 className="era-title">{era.name}</h2>
          <div className="era-dates">{formatYear(era.startYear)} &mdash; {formatYear(era.endYear)}</div>
          <div className="bluf">{era.bluf}</div>
          <div className="summary-text">
            {era.summary.map((p, i) => <p key={i}>{p}</p>)}
          </div>
        </div>
      );
    }

    function App() {
      const [selectedEra, setSelectedEra] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved && ERAS.find(e => e.id === saved)) return saved;
        } catch {}
        return ERAS[0].id;
      });

      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, selectedEra); } catch {}
      }, [selectedEra]);

      const era = ERAS.find(e => e.id === selectedEra);

      return (
        <div className="app">
          <div className="top-row">
            <div className="pane title-pane">
              <div className="title-stages">Stages</div>
              <div className="title-flourish">
                <span className="title-flourish-line" />
                <span className="title-of">of</span>
                <span className="title-flourish-line" />
              </div>
              <div className="title-rome">Rome</div>
              <div className="title-dates">753 BC &mdash; 1453 AD</div>
            </div>
            <div className="pane timeline-pane">
              <Timeline selectedEra={selectedEra} onSelect={setSelectedEra} />
            </div>
          </div>
          <div className="bottom-row">
            <div className="left-pane">
              <div className="site-disclaimer">
                <span className="disclaimer-icon">🚧</span>
                Site still under construction — content may have inaccuracies
              </div>
              <RomeMap selectedEra={selectedEra} />
              <EraStats era={era} />
            </div>
            <SummaryPane era={era} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
