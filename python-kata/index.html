<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python Kata Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      background: #FAF9F6;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .app { display: flex; flex-direction: column; height: 100%; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid #E8E0D8;
      background: #FFFFFF;
      flex-shrink: 0;
    }
    .header-title { font-size: 1.1rem; font-weight: 600; }
    .kata-select {
      padding: 6px 12px; border: 1px solid #E8E0D8; border-radius: 8px;
      background: #FFFFFF; color: #1a1a1a; font-size: 0.9rem;
      cursor: pointer; outline: none;
    }
    .kata-select:focus { border-color: #D97757; }

    /* Split pane */
    .split-pane { display: flex; flex: 1; min-height: 0; }

    /* Problem panel */
    .problem-panel {
      width: 380px; min-width: 320px;
      border-right: 1px solid #E8E0D8;
      overflow-y: auto; padding: 24px; background: #FFFFFF;
    }
    .problem-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .difficulty-badge {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-size: 0.75rem; font-weight: 600; margin-bottom: 16px;
      background: #E8F5EE; color: #2D8659;
    }
    .problem-description { font-size: 0.95rem; line-height: 1.7; color: #3a3a3a; }
    .problem-description p { margin-bottom: 12px; }
    .problem-description h4 {
      font-size: 0.9rem; font-weight: 600; color: #6B5B4F;
      margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .problem-description pre {
      background: #F0EDE8; border-radius: 8px;
      padding: 12px 16px; overflow-x: auto; margin-bottom: 12px;
    }
    .problem-description code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
    }
    /* Editor panel */
    .editor-panel {
      flex: 1; display: flex; flex-direction: column;
      min-width: 0; background: #FAF9F6;
    }
    .editor-wrapper { flex: 1; min-height: 200px; overflow: hidden; }
    .editor-wrapper .cm-editor { height: 100%; }
    .editor-wrapper .cm-scroller {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 14px !important;
    }

    /* Button bar */
    .button-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-top: 1px solid #E8E0D8;
      background: #FFFFFF; flex-shrink: 0;
    }
    .btn {
      padding: 8px 20px; border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: #D97757; color: #FFFFFF; }
    .btn-primary:hover:not(:disabled) { background: #C4623F; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: transparent; color: #6B5B4F; border: 1px solid #E8E0D8; }
    .btn-secondary:hover { background: #F0EDE8; }
    .status-text { font-size: 0.8rem; color: #9B8E83; margin-left: auto; }
    .status-text.loading { color: #D97757; }

    /* Results panel */
    .results-panel {
      min-height: 100px; max-height: 280px; overflow-y: auto;
      padding: 16px; border-top: 1px solid #E8E0D8;
      background: #FFFFFF; flex-shrink: 0;
    }
    .results-summary { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; color: #6B5B4F; }
    .results-summary.all-pass { color: #2D8659; }
    .test-case {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid #F0EDE8;
    }
    .test-case:last-child { border-bottom: none; }
    .test-icon { font-size: 1rem; flex-shrink: 0; width: 20px; text-align: center; }
    .test-icon.pass { color: #2D8659; }
    .test-icon.fail { color: #C4432B; }
    .test-label { font-size: 0.85rem; font-weight: 500; }
    .test-detail {
      font-size: 0.8rem; color: #6B5B4F;
      font-family: 'JetBrains Mono', monospace; margin-top: 4px;
    }
    .test-error {
      font-size: 0.8rem; color: #C4432B;
      font-family: 'JetBrains Mono', monospace; margin-top: 4px;
      white-space: pre-wrap;
    }
    .empty-results { color: #9B8E83; font-size: 0.85rem; font-style: italic; }

    @media (max-width: 768px) {
      .split-pane { flex-direction: column; }
      .problem-panel {
        width: 100%; min-width: unset; max-height: 40vh;
        border-right: none; border-bottom: 1px solid #E8E0D8;
      }
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "htm": "https://esm.sh/htm@3.1.1",

      "@lezer/common": "https://esm.sh/@lezer/common@1.2.1",
      "@lezer/highlight": "https://esm.sh/@lezer/highlight@1.2.0?external=@lezer/common",
      "@lezer/lr": "https://esm.sh/@lezer/lr@1.4.1?external=@lezer/common",

      "@codemirror/state": "https://esm.sh/@codemirror/state@6.4.1",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.33.0?external=@codemirror/state",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.10.3?external=@codemirror/state,@codemirror/view,@lezer/common,@lezer/highlight,@lezer/lr",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.6.2?external=@codemirror/state,@codemirror/view,@codemirror/language",
      "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.18.1?external=@codemirror/state,@codemirror/view,@codemirror/language,@lezer/common",
      "@codemirror/search": "https://esm.sh/@codemirror/search@6.5.6?external=@codemirror/state,@codemirror/view",
      "@codemirror/lint": "https://esm.sh/@codemirror/lint@6.8.2?external=@codemirror/state,@codemirror/view",
      "codemirror": "https://esm.sh/codemirror@6.0.1?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/commands,@codemirror/autocomplete,@codemirror/search,@codemirror/lint",
      "@codemirror/lang-python": "https://esm.sh/@codemirror/lang-python@6.1.6?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/autocomplete,@lezer/common,@lezer/highlight,@lezer/lr",
      "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.2?external=@codemirror/state,@codemirror/view,@codemirror/language,@lezer/highlight"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
import React from "react";
import { createRoot } from "react-dom/client";
import htm from "htm";
import { basicSetup } from "codemirror";
import { EditorView, keymap } from "@codemirror/view";
import { EditorState } from "@codemirror/state";
import { indentWithTab } from "@codemirror/commands";
import { python, pythonLanguage } from "@codemirror/lang-python";
import { oneDark } from "@codemirror/theme-one-dark";
import { indentUnit } from "@codemirror/language";

const { useState, useEffect, useRef, useCallback } = React;
const html = htm.bind(React.createElement);

// ─── Kata Definitions ───────────────────────────────────────────

const KATAS = [
  {
    id: "extract-column",
    title: "Extract Column from Matrix",
    difficulty: "Easy",
    description: `<p>Given a 2D matrix (list of lists) and a column index, return a list containing all elements from that column.</p>
<h4>Example</h4>
<pre><code>matrix = [[1, 2, 3],
          [4, 5, 6],
          [7, 8, 9]]
column = 1
→ [2, 5, 8]</code></pre>`,
    functionName: "extract_column",
    starterCode: "def extract_column(matrix: list[list], column: int) -> list:\n    # Your code here\n    pass",
    testCases: [
      { input: { matrix: [[1,2,3],[4,5,6],[7,8,9]], column: 1 }, expected: [2, 5, 8], label: "3\u00d73 matrix, column 1" },
      { input: { matrix: [[10,20],[30,40],[50,60]], column: 0 }, expected: [10, 30, 50], label: "3\u00d72 matrix, column 0" },
      { input: { matrix: [["a","b","c"]], column: 2 }, expected: ["c"], label: "Single row" },
      { input: { matrix: [[1],[2],[3]], column: 0 }, expected: [1, 2, 3], label: "Single column matrix" },
      { input: { matrix: [], column: 0 }, expected: [], label: "Empty matrix" },
    ]
  },
  {
    id: "binary-search",
    title: "Binary Search",
    difficulty: "Easy",
    description: `<p>Implement binary search on a sorted list of integers. Return the index of the target if found, or <code>-1</code> if not present.</p>
<p>You must implement the algorithm yourself \u2014 do not use built-in search functions.</p>
<h4>Example</h4>
<pre><code>nums = [1, 3, 5, 7, 9, 11]
target = 7
→ 3</code></pre>`,
    functionName: "binary_search",
    starterCode: "def binary_search(nums: list[int], target: int) -> int:\n    # Your code here\n    pass",
    testCases: [
      { input: { nums: [1,3,5,7,9,11], target: 7 }, expected: 3, label: "Target in middle" },
      { input: { nums: [1,3,5,7,9,11], target: 1 }, expected: 0, label: "Target at start" },
      { input: { nums: [1,3,5,7,9,11], target: 11 }, expected: 5, label: "Target at end" },
      { input: { nums: [1,3,5,7,9,11], target: 4 }, expected: -1, label: "Target not found" },
      { input: { nums: [], target: 5 }, expected: -1, label: "Empty list" },
      { input: { nums: [42], target: 42 }, expected: 0, label: "Single element, found" },
    ]
  }
];

// ─── localStorage ───────────────────────────────────────────────

const STORAGE_PREFIX = "python-kata-";
const SELECTED_KEY = "python-kata-selected";

function loadCode(kataId, defaultCode) {
  try { return localStorage.getItem(STORAGE_PREFIX + kataId) ?? defaultCode; }
  catch { return defaultCode; }
}
function saveCode(kataId, code) {
  try { localStorage.setItem(STORAGE_PREFIX + kataId, code); } catch {}
}
function loadSelected() {
  try { return localStorage.getItem(SELECTED_KEY) || KATAS[0].id; }
  catch { return KATAS[0].id; }
}
function saveSelected(id) {
  try { localStorage.setItem(SELECTED_KEY, id); } catch {}
}

// ─── Test Runner ────────────────────────────────────────────────

function cleanError(msg) {
  const lines = msg.trim().split("\n");
  // Return just the final error line (e.g. "NameError: name 'x' is not defined")
  return lines[lines.length - 1] || msg;
}

async function runTests(pyodide, userCode, kata) {
  const results = [];
  for (const tc of kata.testCases) {
    const args = Object.entries(tc.input)
      .map(([key, val]) => `${key}=${JSON.stringify(val)}`)
      .join(", ");

    const script = `import json\n${userCode}\njson.dumps(${kata.functionName}(${args}))`;

    try {
      const resultJson = await pyodide.runPythonAsync(script);
      const actual = JSON.parse(resultJson);
      const passed = JSON.stringify(actual) === JSON.stringify(tc.expected);
      results.push({ ...tc, passed, actual, error: null });
    } catch (err) {
      results.push({ ...tc, passed: false, actual: null, error: cleanError(err.message) });
    }
  }
  return results;
}

// ─── CodeEditor Component ───────────────────────────────────────

function CodeEditor({ value, onChange, onRun }) {
  const containerRef = useRef(null);
  const viewRef = useRef(null);
  const onChangeRef = useRef(onChange);
  const onRunRef = useRef(onRun);
  onChangeRef.current = onChange;
  onRunRef.current = onRun;

  useEffect(() => {
    const state = EditorState.create({
      doc: value,
      extensions: [
        basicSetup,
        python(),
        oneDark,
        indentUnit.of("    "),
        EditorState.tabSize.of(4),
        EditorView.updateListener.of((update) => {
          if (update.docChanged) onChangeRef.current(update.state.doc.toString());
        }),
        keymap.of([
          indentWithTab,
          { key: "Mod-Enter", run: () => { onRunRef.current?.(); return true; } },
        ]),
      ],
    });

    const view = new EditorView({ state, parent: containerRef.current });
    viewRef.current = view;
    return () => view.destroy();
  }, []);

  useEffect(() => {
    const view = viewRef.current;
    if (view && value !== view.state.doc.toString()) {
      view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: value } });
    }
  }, [value]);

  return html`<div ref=${containerRef} style=${{ height: "100%" }} />`;
}

// ─── App ────────────────────────────────────────────────────────

function App() {
  const [selectedId, setSelectedId] = useState(loadSelected);
  const [codes, setCodes] = useState(() => {
    const m = {};
    for (const k of KATAS) m[k.id] = loadCode(k.id, k.starterCode);
    return m;
  });
  const [results, setResults] = useState(null);
  const [running, setRunning] = useState(false);
  const [pyodide, setPyodide] = useState(null);
  const [pyLoading, setPyLoading] = useState(true);
  const [pyError, setPyError] = useState(null);

  const kata = KATAS.find(k => k.id === selectedId) || KATAS[0];
  const code = codes[kata.id];

  // Load Pyodide
  useEffect(() => {
    (async () => {
      try {
        const { loadPyodide } = await import(
          "https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.mjs"
        );
        const py = await loadPyodide();
        setPyodide(py);
      } catch (err) {
        setPyError(err.message);
      } finally {
        setPyLoading(false);
      }
    })();
  }, []);

  const handleKataChange = useCallback((e) => {
    const id = e.target.value;
    setSelectedId(id);
    saveSelected(id);
    setResults(null);
  }, []);

  const handleCodeChange = useCallback((newCode) => {
    setCodes(prev => ({ ...prev, [kata.id]: newCode }));
    saveCode(kata.id, newCode);
  }, [kata.id]);

  const handleRun = useCallback(async () => {
    if (!pyodide || running) return;
    setRunning(true);
    setResults(null);
    try {
      const r = await runTests(pyodide, code, kata);
      setResults(r);
    } catch (err) {
      setResults([{ label: "Execution error", passed: false, actual: null, error: err.message }]);
    } finally {
      setRunning(false);
    }
  }, [pyodide, running, code, kata]);

  const handleReset = useCallback(() => {
    setCodes(prev => ({ ...prev, [kata.id]: kata.starterCode }));
    saveCode(kata.id, kata.starterCode);
    setResults(null);
  }, [kata]);

  const passCount = results ? results.filter(r => r.passed).length : 0;
  const totalCount = results ? results.length : 0;

  return html`
    <div className="app">
      <div className="header">
        <span className="header-title">Python Kata Practice</span>
        <select className="kata-select" value=${selectedId} onChange=${handleKataChange}>
          ${KATAS.map(k => html`<option key=${k.id} value=${k.id}>${k.title}</option>`)}
        </select>
      </div>

      <div className="split-pane">
        <div className="problem-panel">
          <h1 className="problem-title">${kata.title}</h1>
          <span className="difficulty-badge">${kata.difficulty}</span>
          <div className="problem-description"
               dangerouslySetInnerHTML=${{ __html: kata.description }} />
        </div>

        <div className="editor-panel">
          <div className="editor-wrapper">
            <${CodeEditor}
              key=${kata.id}
              value=${code}
              onChange=${handleCodeChange}
              onRun=${handleRun} />
          </div>

          <div className="button-bar">
            <button className="btn btn-primary"
                    onClick=${handleRun}
                    disabled=${pyLoading || running || !!pyError}>
              ${running ? "Running\u2026" : "Run Tests"}
            </button>
            <button className="btn btn-secondary" onClick=${handleReset}>Reset</button>
            <span className="status-text">Ctrl/\u2318+Enter to run</span>
            ${pyLoading && html`<span className="status-text loading" style=${{ marginLeft: "auto" }}>Loading Python runtime\u2026</span>`}
            ${pyError && html`<span className="status-text" style=${{ color: "#C4432B", marginLeft: "auto" }}>Failed to load Python</span>`}
          </div>

          <div className="results-panel">
            ${!results && !running && html`
              <span className="empty-results">Click "Run Tests" to check your solution.</span>
            `}
            ${running && html`
              <span className="empty-results">Running tests\u2026</span>
            `}
            ${results && html`
              <div>
                <div className=${`results-summary${passCount === totalCount ? " all-pass" : ""}`}>
                  ${passCount === totalCount
                    ? `All ${totalCount} tests passed!`
                    : `${passCount}/${totalCount} tests passed`}
                </div>
                ${results.map((r, i) => html`
                  <div key=${i} className="test-case">
                    <span className=${`test-icon ${r.passed ? "pass" : "fail"}`}>
                      ${r.passed ? "\u2713" : "\u2717"}
                    </span>
                    <div>
                      <div className="test-label">${r.label}</div>
                      ${!r.passed && r.error && html`
                        <div className="test-error">${r.error}</div>
                      `}
                      ${!r.passed && !r.error && html`
                        <div className="test-detail">
                          Expected: ${JSON.stringify(r.expected)}${" \u00a0|\u00a0 "}Got: ${JSON.stringify(r.actual)}
                        </div>
                      `}
                    </div>
                  </div>
                `)}
              </div>
            `}
          </div>
        </div>
      </div>
    </div>
  `;
}

createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
