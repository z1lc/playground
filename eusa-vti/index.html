    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {

      color: #94a3b8;
      margin-bottom: 24px;
      line-height: 1.55;
      max-width: 880px;
    }
    .subtitle em { color: #64748b; font-style: normal; }
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 18px;
    }
    .selector {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
    }
    .selector .hint {
      font-size: 12.5px;
      color: #64748b;
      margin-left: auto;
      font-style: italic;
    }
    .checkbox-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      color: #cbd5e1;
      background: rgba(255, 255, 255, 0.02);
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      user-select: none;
    }
    .checkbox-pill:hover { border-color: rgba(255, 255, 255, 0.25); }
    .checkbox-pill input { appearance: none; -webkit-appearance: none; margin: 0; width: 0; height: 0; position: absolute; }
    .checkbox-pill .swatch {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.20);
      flex-shrink: 0;
    }
    .checkbox-pill.selected { color: #f1f5f9; background: rgba(255, 255, 255, 0.07); border-color: rgba(255, 255, 255, 0.30); }

    .legend-row {
      display: flex;
      gap: 14px 22px;
      flex-wrap: wrap;
      padding: 0 6px 12px;
      font-size: 12.5px;
      color: #cbd5e1;
    }
    .legend-row .swatch {
      display: inline-block;
      width: 14px; height: 3px;
      vertical-align: middle;
      margin-right: 8px;
      border-radius: 2px;
    }
    .legend-row .legend-axis {
      color: #64748b;
      font-size: 11.5px;
      margin-left: 6px;
    }

    .recharts-default-tooltip {
      background: #1e293b !important;
      border: 1px solid #334155 !important;
      border-radius: 8px !important;
    }
    .tt {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12.5px;
      min-width: 200px;
    }
    .tt-date {
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .tt-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .tt-row .swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .tt-row .label { color: #94a3b8; flex: 1; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
    .tt-row .value { color: #f1f5f9; font-weight: 500; }

    .methodology h2 { font-size: 1.05rem; font-weight: 700; color: #e2e8f0; margin-bottom: 8px; }
    .methodology h3 { font-size: 0.9rem; font-weight: 600; color: #e2e8f0; margin: 14px 0 4px; text-transform: uppercase; letter-spacing: 0.04em; color: #94a3b8; }
    .methodology p { margin-bottom: 8px; }
    .methodology ul { padding-left: 20px; margin: 4px 0 8px; }
    .methodology li { margin-bottom: 3px; }
    .methodology a { color: #fbbf24; text-decoration: none; }
    .methodology a:hover { text-decoration: underline; }
    .methodology code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: #fbbf24; }

    .empty-msg { color: #64748b; font-size: 13px; padding: 80px 20px; text-align: center; }

                    </div>
                  `;
                })}
              </div>
            `;
          })}
        </div>
      `;
    }

    function App() {
      const metricsById = useMemo(() => {
        const map = new Map();
        for (const m of (DATA.metrics || [])) map.set(m.id, m);
        return map;
      }, []);

      // Selection lives as a list of axis-group entries. Each entry is
      // `{ group, metrics: [metricId, ...] }`. Max 2 entries (one per axis).
      // Within an entry there's no upper bound — all weight metrics share an
      // axis, so any number of weight metrics is fine.
      const initialSelection = useMemo(() => {
        const etfList = DATA.etfs || ['EUSA', 'VTI'];
        const hasData = (id) => {
          const m = metricsById.get(id);
          return m && etfList.some((e) => (m.series[e] || []).length > 0);
        };
        const out = [];
        for (const id of PREFERRED_DEFAULTS) {
          if (!hasData(id)) continue;
          const group = METRIC_GROUPS[id];
          const existing = out.find((e) => e.group === group);
          if (existing) {
            // Keep selection compact: only include the first metric per group
            // by default; user can add more.
            continue;
          }
          if (out.length >= 2) break;
          out.push({ group, metrics: [id] });
        }
        if (out.length === 0 && DATA.metrics?.length) {
          const first = DATA.metrics[0];
          out.push({ group: METRIC_GROUPS[first.id] || 'index', metrics: [first.id] });
        }
        return out;
      }, [metricsById]);
      const [selection, setSelection] = useState(() => {
        const stored = loadStoredSelection(metricsById);
        return stored || initialSelection;
      });

      // Persist on every change. localStorage may throw in private mode etc.
      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(selection));
        } catch (e) { /* swallow */ }
      }, [selection]);

      const toggle = useCallback((id) => {
        setSelection((prev) => {
          const group = METRIC_GROUPS[id] || 'other';
          const groupIdx = prev.findIndex((s) => s.group === group);
          if (groupIdx >= 0) {
            const entry = prev[groupIdx];
            if (entry.metrics.includes(id)) {
              // Removing — keep at least one metric overall.
              const remaining = entry.metrics.filter((m) => m !== id);
              if (remaining.length === 0) {
                if (prev.length === 1) return prev;
                return prev.filter((_, i) => i !== groupIdx);
              }
              return prev.map((s, i) => i === groupIdx ? { ...s, metrics: remaining } : s);
            }
            // Adding to an existing group — no FIFO needed, axis is shared.
            return prev.map((s, i) => i === groupIdx ? { ...s, metrics: [...s.metrics, id] } : s);
          }
          // New group: if we already have 2, drop the oldest entry.
          const next = prev.length >= 2 ? prev.slice(1) : prev.slice();
          next.push({ group, metrics: [id] });
          return next;
        });
      }, []);

      // Flatten selection into the list of metric objects, preserving order.
      const selectedMetrics = selection.flatMap((entry) =>
        entry.metrics.map((id) => metricsById.get(id)).filter(Boolean)
      );

      const etfs = DATA.etfs || ['EUSA', 'VTI'];
      const chartData = useMemo(() => buildChartData(selectedMetrics, etfs), [selectedMetrics, etfs]);

      // Determine x-axis domain — restrict to dates where at least one
      // visible series has data, to avoid a giant blank left margin when
      // only holdings (2019+) are selected.
      const xDomain = useMemo(() => {
        if (!chartData.length) return ['auto', 'auto'];
        let firstActive = null;
        for (let i = 0; i < chartData.length; i++) {
          const row = chartData[i];
          const hasAny = Object.entries(row).some(([k, v]) => k !== 'date' && v != null);
          if (hasAny) { firstActive = row.date; break; }
        }
        return [firstActive || chartData[0].date, chartData[chartData.length - 1].date];
      }, [chartData]);

      // One y-axis per axis-group in the selection (left for group 0,
      // right for group 1). All metrics within a group share that axis.
      const yAxes = selection.map((entry, i) => {
        const slot = i === 0 ? 'A' : 'B';
        const groupSpec = GROUP_AXIS[entry.group] || { domain: ['auto', 'auto'], format: 'percent' };
        return {
          id: slot,
          orientation: i === 0 ? 'left' : 'right',
          format: groupSpec.format,
          domain: groupSpec.domain,
          group: entry.group,
        };
      });
      const slotForGroup = (group) => {
        const idx = selection.findIndex((s) => s.group === group);
        return idx === 0 ? 'A' : (idx === 1 ? 'B' : 'A');
      };

      // Each selected metric becomes 2 lines (EUSA + VTI) on its group's axis.
      const lines = [];
      for (const m of selectedMetrics) {
        const palette = colorsFor(m.id);
        const slot = slotForGroup(METRIC_GROUPS[m.id]);
        for (const etf of etfs) {
          lines.push({
            key: `${m.id}_${etf}`,
            stroke: palette[etf],
            yAxisId: slot,
            etf,
            metricLabel: m.label,
          });
        }
      }

      // Tick formatter for x-axis: thin out years.
      const xTicks = useMemo(() => {
        if (!chartData.length) return [];
        const ticks = [];
        let lastYear = null;
        for (const row of chartData) {
          const y = row.date.slice(0, 4);
          if (y !== lastYear) {
            ticks.push(row.date);
            lastYear = y;
          }
        }
        return ticks;
      }, [chartData]);

      const fmtAxis = (axisIdx) => {
        const ax = yAxes[axisIdx];
        const f = FORMATTERS[ax?.format];
        return f || ((v) => v?.toString() ?? '');
      };

      const aiBasketStr = (DATA.metadata?.aiBasketConstituents || []).join(', ');
      const mag7Str = (DATA.metadata?.mag7Constituents || []).join(', ');
      const generatedAt = DATA.generatedAt || '';
      const testfolio = DATA.metadata?.testfolioReference || 'https://testfol.io/?s=1Q1EK9qneMy';

      return html`
        <div class="container">
          <h1>EUSA vs VTI</h1>
          <p class="subtitle">
            EUSA (iShares MSCI USA Equal Weighted) and VTI (Vanguard Total Stock Market) are two very different bets on US equities — equal-weighted vs cap-weighted.
            Pick metrics below to compare them over time — weight metrics share an axis, so any combination is fair game.
            <em>Data through ${generatedAt}.</em>
          </p>

          <div class="card">
            <div class="selector">
              ${(DATA.metrics || []).map((m) => {
                const isSelected = selection.some((s) => s.metrics.includes(m.id));
                const empty = !etfs.some((e) => (m.series[e] || []).length > 0);
                const palette = colorsFor(m.id);
                // When selected, the dot shows both ETF shades for this metric:
                // VTI (darker) fills the top-left half, EUSA (lighter) fills
                // the bottom-right half, split on a 45° diagonal.
                const swatchStyle = isSelected
                  ? { background: `linear-gradient(135deg, ${palette.VTI} 0%, ${palette.VTI} 50%, ${palette.EUSA} 50%, ${palette.EUSA} 100%)` }
                  : {};
                const labelStyle = empty ? {opacity: 0.4, cursor: 'not-allowed'} : {};
                return html`
                  <label class=${`checkbox-pill ${isSelected ? 'selected' : ''}`} key=${m.id}
                    style=${labelStyle}>
                    <input type="checkbox" checked=${isSelected} disabled=${empty}
                      onChange=${() => !empty && toggle(m.id)} />
                    <span class="swatch" style=${swatchStyle}></span>
                    <span>${m.label}${empty ? ' (no data)' : ''}</span>
                  </label>
                `;
              })}
              <span class="hint">Weight metrics share an axis — pick as many as you like. Drawdown and total-return each get their own axis.</span>
            </div>
          </div>

          <div class="card">
            <div class="legend-row">
              ${selectedMetrics.map((m) => {
                const palette = colorsFor(m.id);
                const slot = slotForGroup(METRIC_GROUPS[m.id]);
                const axisLabel = selection.length > 1
                  ? (slot === 'A' ? 'left axis' : 'right axis')
                  : 'left axis';
                return html`
                  <span key=${m.id}>
                    <span class="swatch" style=${{background: palette.EUSA}}></span>EUSA · ${m.label}
                    <span class="legend-axis">(${axisLabel})</span>
                  </span>
                  <span key=${m.id + '-vti'}>
                    <span class="swatch" style=${{background: palette.VTI}}></span>VTI · ${m.label}
                  </span>
                `;
              })}
            </div>
            ${chartData.length === 0 ? html`<div class="empty-msg">No data available for the selected metrics.</div>` : html`
              <${ResponsiveContainer} width="100%" height=${500}>
                <${LineChart} data=${chartData} margin=${{ top: 12, right: 24, left: 12, bottom: 8 }}>
                  <${CartesianGrid} strokeDasharray="3 3" stroke="#1e293b" />
                  <${XAxis}
                    dataKey="date"
                    type="category"
                    ticks=${xTicks}
                    tickFormatter=${(d) => d.slice(0, 4)}
                    tick=${{fill: '#64748b', fontSize: 11}}
                    stroke="#334155"
                    minTickGap=${20}
                    domain=${xDomain}
                  />
                  ${yAxes.map((ax, i) => html`
                    <${YAxis}
                      key=${ax.id}
                      yAxisId=${ax.id}
                      orientation=${ax.orientation}
                      tickFormatter=${fmtAxis(i)}
                      tick=${{fill: '#64748b', fontSize: 11}}
                      stroke="#334155"
                      domain=${ax.domain}
                      width=${60}
                    />
                  `)}
                  <${Tooltip}
                    content=${(props) => html`<${CustomTooltip} ...${props} metrics=${selectedMetrics} etfs=${etfs} />`}
                    cursor=${{stroke: '#475569', strokeDasharray: '3 3'}}
                  />
                  ${lines.map((l) => html`
                    <${Line}
                      key=${l.key}
                      type="monotone"
                      dataKey=${l.key}
                      stroke=${l.stroke}
                      yAxisId=${l.yAxisId}
                      strokeWidth=${1.6}
                      dot=${false}
                      isAnimationActive=${false}
                      connectNulls=${false}
                    />
                  `)}
                </>
              </>
            `}
          </div>

          <div class="card methodology">
            <h2>Methodology</h2>
            <p>
              Each metric is plotted at daily granularity. Slow-moving series (quarterly N-PORT holdings) are forward-filled between report dates, so they render as flat segments that step up/down on report days. Drawdown and cumulative return use total-return prices (yfinance auto-adjusted close).
            </p>

            <h3>Holdings baskets</h3>
            <ul>
              <li><strong>Mag 7</strong> = ${mag7Str || 'AAPL, AMZN, GOOG, GOOGL, META, MSFT, NVDA, TSLA'}.</li>
              <li><strong>Broader AI basket</strong> = ${aiBasketStr || 'Mag 7 plus AVGO, AMD, ORCL, CRM, NFLX, PLTR, SMCI, DELL, ARM, MU, SNOW'}.</li>
              <li><strong>Tech &amp; Communication Services weight</strong> is intentionally broader than GICS Information Technology alone. It sums every holding whose GICS sector is either <em>Technology</em> (AAPL, MSFT, NVDA, AMD, AVGO, ORCL, CRM, ...) or <em>Communication Services</em> (META, GOOGL, NFLX, plus telecom/media), and adds AMZN and TSLA explicitly (they're in Consumer Cyclical but are core to the AI-narrative reading). This roughly approximates the pre-2018 GICS Information Technology definition and matches the AI basket's sector footprint.</li>
            </ul>

            <h3>Sources</h3>
            <ul>
              <li><strong>Daily prices</strong> — yfinance, auto-adjusted close (i.e., total return).</li>
              <li><strong>Holdings</strong> — SEC EDGAR Form N-PORT-P filings, quarterly from 2019. Each filing's <code>repPdDate</code> is treated as the as-of date for the included holdings.</li>
              <li><strong>Sector classification</strong> — N-PORT itself does not carry GICS sectors. Each holding's name is normalized and mapped to a ticker via SEC's <code>company_tickers.json</code> + <code>company_tickers_exchange.json</code> (with a small manual override list for known mismatches), then the ticker is mapped to its current GICS sector via yfinance. The mapping reflects today's sector for historical filings, which is fine in practice — sector reassignments are rare. ~98% of non-cash holdings weight is classified per filing; the unmatched residual is mostly small foreign ADRs and recently-IPO'd names.</li>
              <li><strong>Drawdown reference</strong> — cross-checked against <a href=${testfolio} target="_blank" rel="noopener">testfol.io</a> (2010-05 inception, EUSA's first trading day).</li>
            </ul>
          </div>
        </div>
      `;
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
